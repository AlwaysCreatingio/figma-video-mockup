# Keeps the Render free-tier export server warm so exports don't hit a ~1 min cold start.
name: keep export server warm
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - run: curl -s -m 30 -o /dev/null -w "health %{http_code}\n" https://agentopus-export.onrender.com/health
