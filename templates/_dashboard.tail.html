/* dominant (most common opaque) color of a logo image — used as the default tile background.
   Library logos are precomputed in window.__LOGO_BG; everything else is sampled on a canvas. */
window.__logoDominant = function (uri) {
  window.__logoBgCache = window.__logoBgCache || {};
  const pre = (window.__LOGO_BG || {})[uri];
  if (pre) return Promise.resolve(pre);
  if (window.__logoBgCache[uri]) return Promise.resolve(window.__logoBgCache[uri]);
  return new Promise(res => {
    const img = new Image();
    img.onload = function () {
      try {
        const N = 48, c = document.createElement("canvas"); c.width = N; c.height = N;
        const ctx = c.getContext("2d"); ctx.drawImage(img, 0, 0, N, N);
        const d = ctx.getImageData(0, 0, N, N).data, m = {};
        for (let i = 0; i < d.length; i += 4) {
          if (d[i + 3] < 128) continue;
          const key = ((d[i] >> 4) << 8) | ((d[i + 1] >> 4) << 4) | (d[i + 2] >> 4);
          const s = m[key] || (m[key] = { n: 0, r: 0, g: 0, b: 0 });
          s.n++; s.r += d[i]; s.g += d[i + 1]; s.b += d[i + 2];
        }
        let best = null; for (const k in m) if (!best || m[k].n > best.n) best = m[k];
        let hex = null;
        if (best) hex = "#" + [best.r / best.n, best.g / best.n, best.b / best.n].map(v => Math.round(v).toString(16).padStart(2, "0")).join("");
        if (hex) window.__logoBgCache[uri] = hex;
        res(hex);
      } catch (e) { res(null); }
    };
    img.onerror = function () { res(null); };
    img.src = uri;
  });
};

function parseColor(str) {

function pathOf(el, root) { const idx = []; let n = el; while (n && n !== root) { const p = n.parentNode; if (!p) break; idx.unshift(Array.prototype.indexOf.call(p.children, n)); n = p; } return idx.join("."); }
function nodeAt(root, path) { if (path === "") return root; let n = root; for (const i of path.split(".")) { if (!n) return null; n = n.children[+i]; } return n; }

/* ---------- demos persistence (IndexedDB holds the media-heavy records; localStorage holds a light index) ---------- */
function idbOpen() {
  return new Promise((res, rej) => {
    const r = indexedDB.open("aoDemos", 1);
    r.onupgradeneeded = () => r.result.createObjectStore("demos", { keyPath: "id" });
    r.onsuccess = () => res(r.result);
    r.onerror = () => rej(r.error);
  });
}
async function idbPut(rec) { const db = await idbOpen(); return new Promise((res, rej) => { const tx = db.transaction("demos", "readwrite"); tx.objectStore("demos").put(rec); tx.oncomplete = () => res(); tx.onerror = () => rej(tx.error); }); }
async function idbGet(id) { const db = await idbOpen(); return new Promise((res, rej) => { const tx = db.transaction("demos", "readonly"); const g = tx.objectStore("demos").get(id); g.onsuccess = () => res(g.result); g.onerror = () => rej(g.error); }); }
async function idbDel(id) { const db = await idbOpen(); return new Promise((res, rej) => { const tx = db.transaction("demos", "readwrite"); tx.objectStore("demos").delete(id); tx.oncomplete = () => res(); tx.onerror = () => rej(tx.error); }); }
const toDataURL = (blob) => new Promise(r => { const fr = new FileReader(); fr.onload = () => r(fr.result); fr.readAsDataURL(blob); });
const srcToDataURL = async (src) => (src && src.startsWith("blob:")) ? toDataURL(await fetch(src).then(r => r.blob())) : src;

/* Demo store: cloud (Supabase) when window.__SUPABASE is configured, else local (IndexedDB).
   Records look the same to the app: { id, name, templateId, thumb, vids{slot:{url,img}},
   logos, boxText, showPlus, hiddenLogos, overrides }. On save, rec.vids holds { blob, img, type }. */
const SB = (typeof window !== "undefined" && window.__SUPABASE && window.__SUPABASE.url && window.supabase)
  ? window.supabase.createClient(window.__SUPABASE.url, window.__SUPABASE.anonKey) : null;
const SB_BUCKET = "demo-media";
const demoStore = {
  cloud: !!SB,
  async list() {
    if (SB) {
      const { data, error } = await SB.from("demos").select("*").order("created_at", { ascending: false });
      if (error) { console.warn("[supabase] list:", error.message); return []; }
      return (data || []).map(r => ({ id: r.id, name: r.name, templateId: r.template_id, thumb: r.thumb, createdAt: r.created_at, ...(r.payload || {}) }));
    }
    const db = await idbOpen();
    return new Promise(res => { const g = db.transaction("demos", "readonly").objectStore("demos").getAll(); g.onsuccess = () => res((g.result || []).sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0))); g.onerror = () => res([]); });
  },
  async save(rec, opts) {
    if (SB) {
      const vids = {};
      for (const k in rec.vids) {
        const v = rec.vids[k], ext = ((v.type || "video/mp4").split("/")[1] || "bin").split(";")[0], p = rec.id + "/" + k + "." + ext;
        await SB.storage.from(SB_BUCKET).remove([p]);
        const up = await SB.storage.from(SB_BUCKET).upload(p, v.blob, { contentType: v.type });
        if (up.error) throw new Error("upload failed for " + k + ": " + up.error.message);
        vids[k] = { url: SB.storage.from(SB_BUCKET).getPublicUrl(p).data.publicUrl, img: v.img };
      }
      const row = { id: rec.id, name: rec.name, template_id: rec.templateId, thumb: rec.thumb, payload: { vids, logos: rec.logos, boxText: rec.boxText, labelText: rec.labelText, arrowOn: !!rec.arrowOn, scrollSpeed: rec.scrollSpeed || 1, campaign: rec.campaign || null, showPlus: rec.showPlus, hiddenLogos: rec.hiddenLogos, logosHidden: rec.logosHidden, mediaXf: rec.mediaXf, overrides: rec.overrides } };
      if (opts && opts.createdAt) row.created_at = opts.createdAt;
      const { error } = await SB.from("demos").insert(row);
      if (error) { console.warn("[supabase] insert:", error.message); throw error; }
      return;
    }
    const vids = {};
    for (const k in rec.vids) vids[k] = { url: await toDataURL(rec.vids[k].blob), img: rec.vids[k].img };
    return idbPut({ ...rec, vids, createdAt: (opts && opts.createdAt) || Date.now() });
  },
  // overwrite an existing record in place (same id, created_at preserved)
  async replace(rec) {
    let createdAt = null;
    if (SB) {
      const { data } = await SB.from("demos").select("created_at").eq("id", rec.id).maybeSingle();
      createdAt = data && data.created_at;
      await SB.from("demos").delete().eq("id", rec.id);
    } else {
      const old = await idbGet(rec.id);
      createdAt = old && old.createdAt;
      await idbDel(rec.id);
    }
    return this.save(rec, { createdAt: createdAt || undefined });
  },
  async remove(id) {
    if (SB) {
      const { data } = await SB.storage.from(SB_BUCKET).list(id);
      if (data && data.length) await SB.storage.from(SB_BUCKET).remove(data.map(f => id + "/" + f.name));
      await SB.from("demos").delete().eq("id", id);
      return;
    }
    return idbDel(id);
  },
  // patch fields into a demo's payload. RLS grants select/insert/delete but not update,
  // so the cloud path replaces the row (created_at preserved).
  async patch(id, fields) {
    if (SB) {
      const { data } = await SB.from("demos").select("*").eq("id", id).single();
      if (!data) return;
      await SB.from("demos").delete().eq("id", id);
      const { error } = await SB.from("demos").insert({ ...data, payload: { ...(data.payload || {}), ...fields } });
      if (error) console.warn("[supabase] patch:", error.message);
      return;
    }
    const rec = await idbGet(id); if (!rec) return;
    return idbPut({ ...rec, ...fields });
  },
  // hidden built-in templates (owner-curated gallery)
  async setHiddenTpls(idsArr) {
    const id = "cfg:hidden-tpls";
    if (SB) {
      const { data } = await SB.from("demos").select("*").eq("id", id).maybeSingle();
      if (data) await SB.from("demos").delete().eq("id", id);
      await SB.from("demos").insert({ id, name: "__cfg__", template_id: "__cfg__", thumb: null, payload: { ids: idsArr } });
      return;
    }
    await idbPut({ id, ids: idsArr });
  },
  // +1 download on a creative (fire-and-forget)
  async bump(id) {
    try {
      if (SB) {
        const { data } = await SB.from("demos").select("*").eq("id", id).maybeSingle();
        if (!data) return;
        await SB.from("demos").delete().eq("id", id);
        await SB.from("demos").insert({ ...data, payload: { ...(data.payload || {}), downloads: ((data.payload || {}).downloads || 0) + 1 } });
        return;
      }
      const rec = await idbGet(id); if (!rec) return;
      await idbPut({ ...rec, downloads: (rec.downloads || 0) + 1 });
    } catch (e) {}
  },
  // +1 export for a template (single stats row keyed by template id)
  async bumpTpl(tplId) {
    try {
      const id = "stats:tpl-dl";
      if (SB) {
        const { data } = await SB.from("demos").select("*").eq("id", id).maybeSingle();
        const counts = (data && data.payload && data.payload.counts) || {};
        counts[tplId] = (counts[tplId] || 0) + 1;
        if (data) await SB.from("demos").delete().eq("id", id);
        await SB.from("demos").insert({ id, name: "__stats__", template_id: "__stats__", thumb: null, payload: { counts } });
        return;
      }
      const rec = (await idbGet(id)) || { id };
      rec.counts = rec.counts || {}; rec.counts[tplId] = (rec.counts[tplId] || 0) + 1;
      await idbPut(rec);
    } catch (e) {}
  },
  // attach the rendered MP4 to an existing demo (the demo card then plays the real output)
  async attachMp4(id, blob) {
    if (SB) {
      const p = id + "/out.mp4";
      await SB.storage.from(SB_BUCKET).remove([p]);
      const up = await SB.storage.from(SB_BUCKET).upload(p, blob, { contentType: "video/mp4" });
      if (up.error) { console.warn("[supabase] mp4 upload:", up.error.message); return; }
      return this.patch(id, { mp4: SB.storage.from(SB_BUCKET).getPublicUrl(p).data.publicUrl + "?v=" + Date.now() });
    }
    const rec = await idbGet(id); if (!rec) return;
    rec.mp4 = await toDataURL(blob);
    return idbPut(rec);
  },
};

/* fullscreen preview: plays the rendered MP4 (or shows the saved thumb) with a download action */
function DemoPreview({ d, t, rec, pre, onClose, onOpen, onRender, renderProg, onCancelRender }) {
  const mp4 = rec && rec.mp4;
  const ref = useRef(null);
  const vidRef = useRef(null);
  const [muted, setMuted] = useState(false);
  useDemoOverrides(ref, mp4 ? null : rec);
  useEffect(() => {
    const v = vidRef.current; if (!v) return;
    v.muted = false;
    const q = v.play();
    if (q && q.catch) q.catch(() => { v.muted = true; setMuted(true); const q2 = v.play(); if (q2 && q2.catch) q2.catch(() => {}); });
  }, [mp4]);
  useEffect(() => { if (vidRef.current) vidRef.current.muted = muted; }, [muted]);
  // live preview (no rendered mp4 yet): slot videos follow the mute toggle; ambient stays silent
  useEffect(() => {
    if (mp4) return;
    const root = ref.current; if (!root) return;
    const t0 = setTimeout(() => {
      root.querySelectorAll("[data-vslot] video").forEach(v => {
        const slotK = v.closest("[data-vslot]").getAttribute("data-vslot");

async function downloadUrl(url, name) {
  try {
    const r = await fetch(url); if (!r.ok) throw new Error("fetch failed");
    const o = URL.createObjectURL(await r.blob());
    const a = document.createElement("a"); a.href = o; a.download = name; document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(o), 4000);
  } catch (e) { window.open(url, "_blank"); }
}
function solidifySlotsIn(root) {
  root.querySelectorAll("[data-vslot]").forEach(el => {
    if (el.querySelector("video, img")) { if (el.dataset.opq) { el.style.backgroundColor = ""; delete el.dataset.opq; } return; }
    if (el.dataset.opq) return;
    const m = (getComputedStyle(el).backgroundColor || "").match(/rgba\(([\d.]+),\s*([\d.]+),\s*([\d.]+),\s*([\d.]+)\)/);
    if (!m || +m[4] >= 1) return;
    let bg = [24, 24, 24], n = el.parentElement;
    while (n && root.contains(n)) {
      const c = (getComputedStyle(n).backgroundColor || "").match(/rgba?\((\d+),\s*(\d+),\s*(\d+)(?:,\s*([\d.]+))?\)/);
      if (c && (c[4] == null || +c[4] >= 1)) { bg = [+c[1], +c[2], +c[3]]; break; }
      n = n.parentElement;
    }
    const a = +m[4];
    const mix = (f, b) => Math.round(a * f + (1 - a) * b);
    el.style.backgroundColor = `rgb(${mix(+m[1], bg[0])}, ${mix(+m[2], bg[1])}, ${mix(+m[3], bg[2])})`;
    el.dataset.opq = "1";
  });
}

function SeekBar({ rootRef }) {
  const [st, setSt] = useState({ t: 0, d: 0 });
  const barRef = useRef(null);
  const dragRef = useRef(false);
  useEffect(() => {
    const id = setInterval(() => {
      if (dragRef.current) return;
      const root = rootRef.current; if (!root) return;
      const vids = [...root.querySelectorAll("[data-vslot] video")].filter(v => v.duration);
      if (!vids.length) { setSt(s2 => (s2.d ? { t: 0, d: 0 } : s2)); return; }
      const v = vids.reduce((a, b) => ((b.duration || 0) > (a.duration || 0) ? b : a));
      setSt({ t: v.currentTime || 0, d: v.duration || 0 });
    }, 250);
    return () => clearInterval(id);
  }, []);
  if (!st.d) return null;
  const fmt = (x) => Math.floor(x / 60) + ":" + String(Math.floor(x % 60)).padStart(2, "0");
  const applyFrac = (clientX) => {
    const bar = barRef.current; if (!bar) return;
    const r = bar.getBoundingClientRect();
    const f = Math.min(1, Math.max(0, (clientX - r.left) / r.width));
    const root = rootRef.current; if (!root) return;
    root.querySelectorAll("[data-vslot] video").forEach(v => { try { v.currentTime = f * (v.duration || 0); } catch (err) {} });
    setSt(s2 => ({ ...s2, t: f * (s2.d || 0) }));
  };
  const startDrag = (e) => {
    e.preventDefault();
    dragRef.current = true;
    applyFrac(e.clientX);
    const mv = (ev) => applyFrac(ev.clientX);
    const up = () => { dragRef.current = false; window.removeEventListener("pointermove", mv); window.removeEventListener("pointerup", up); };
    window.addEventListener("pointermove", mv);
    window.addEventListener("pointerup", up);
  };
  const pct = (st.t / st.d) * 100;
  return (
    <div className="flex items-center gap-2 mt-1">
      <div ref={barRef} onPointerDown={startDrag} className="relative w-[240px] h-[16px] flex items-center cursor-pointer">
        <div className="w-full h-[6px] rounded-full bg-white/15 overflow-hidden">
          <div className="h-full bg-white pointer-events-none" style={{ width: pct + "%" }} />
        </div>
        <div className="absolute -translate-x-1/2 w-[13px] h-[13px] rounded-full bg-white shadow pointer-events-none" style={{ left: pct + "%" }} />
      </div>
      <span className="text-[13px] text-zinc-400 font-medium tabular-nums">{fmt(st.t)} / {fmt(st.d)}</span>
    </div>
  );
}

/* one downloadable brand asset: format menu (SVG/PNG/JPG) + hover eye -> preview modal */
function AssetCard({ file, label, bg, onPreview }) {
  const [menu, setMenu] = useState(false);
  useEffect(() => {
    if (!menu) return;
    const close = () => setMenu(false);
    window.addEventListener("click", close);
    return () => window.removeEventListener("click", close);
  }, [menu]);
  const isSvg = file.endsWith(".svg");
  const base = file.replace(/\.(svg|png|jpg)$/, "");
  const trigger = (href, name) => { const a = document.createElement("a"); a.href = href; a.download = name; a.click(); if (window.__toast) window.__toast("Downloading " + name); };
  const dl = async (fmt) => {
    setMenu(false);
    const url = "/brand/" + file;
    if (fmt === (isSvg ? "svg" : "png") && fmt !== "jpg") {
      if (fmt === "svg" || file.endsWith(".png")) { trigger(url, base + "." + fmt); return; }
    }
    const img = new Image();
    img.src = url;
    await new Promise((res, rej) => { img.onload = res; img.onerror = rej; });
    let ratio = img.naturalWidth ? img.naturalHeight / img.naturalWidth : 0;
    if (!isFinite(ratio) || !ratio) {
      const txt = await fetch(url).then(r => r.text());
      const m = txt.match(/viewBox="([\d.\s-]+)"/);
      const vb = m ? m[1].trim().split(/\s+/).map(Number) : null;
      ratio = vb && vb[2] ? vb[3] / vb[2] : 1;
    }
    const W = 1600, c = document.createElement("canvas");
    c.width = W; c.height = Math.max(2, Math.round(W * ratio));
    const ctx = c.getContext("2d");
    if (fmt === "jpg") { ctx.fillStyle = bg || "#ffffff"; ctx.fillRect(0, 0, c.width, c.height); }
    ctx.drawImage(img, 0, 0, c.width, c.height);
    trigger(c.toDataURL(fmt === "jpg" ? "image/jpeg" : "image/png", 0.95), base + "." + fmt);
  };
  const fmts = isSvg ? ["svg", "png", "jpg"] : ["png", "jpg"];
  return (
    <div className="snap-start shrink-0 w-[200px] rounded-[30px] bg-white/[0.03] border border-white/10 overflow-hidden">
      <button onClick={() => onPreview({ file, label, bg })} className="relative w-full h-[120px] flex items-center justify-center p-5 group/asset" style={{ background: bg }}>
        <img src={"/brand/" + file} alt={label} className="max-h-full max-w-full object-contain" />
        <span className="absolute inset-0 flex items-center justify-center bg-zinc-950/0 group-hover/asset:bg-zinc-950/40 opacity-0 group-hover/asset:opacity-100 transition">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </span>
      </button>
      <div className="p-3.5 flex items-center justify-between gap-2 relative">
        <span className="text-xs font-medium text-zinc-300 truncate">{label}</span>
        <button onClick={(e) => { e.stopPropagation(); window.dispatchEvent(new Event("click")); setMenu(m => !m); }} title="Download"
          className="shrink-0 w-7 h-7 flex items-center justify-center rounded-full bg-white/10 text-zinc-300 hover:bg-white/20 hover:text-white transition">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/></svg>
        </button>
        {menu && <div className="absolute right-2 bottom-11 z-40 w-28 rounded-[18px] overflow-hidden bg-[#242424] shadow-xl border border-white/10 py-1.5" onClick={e => e.stopPropagation()}>
          {fmts.map(f => <button key={f} onClick={() => dl(f)} className="w-full text-left px-3.5 py-1.5 text-sm text-zinc-200 hover:bg-white/10 transition uppercase">{f}</button>)}
        </div>}
      </div>
    </div>
  );
}

                    <div className="relative w-[min(980px,94vw)] max-h-[86vh] rounded-[30px] overflow-hidden bg-[#1f1f1f] border border-white/10 shadow-2xl flex flex-col" onClick={e => e.stopPropagation()}>
                    <div className="vscroll overflow-y-auto">
                      <div className="relative h-[180px]">
                        <div className="absolute inset-0" style={{ background: c.grad }} />
                        <div className="absolute inset-0 bg-gradient-to-t from-[#1f1f1f] via-zinc-950/30 to-transparent" />
                        <button onClick={() => setOpenCampaign(null)} className="absolute top-4 right-4 w-8 h-8 flex items-center justify-center rounded-full bg-black/50 text-zinc-200 hover:bg-black/70 transition">✕</button>

                      <div className="px-7 pb-8">
                        <div className="flex gap-1.5 mt-4 mb-5">
                          {[["overview", "Overview"], ["resources", "Resources"]].map(([k, l]) => (
                            <button key={k} onClick={() => setCampTab(k)}
                              className={"px-3.5 py-1.5 rounded-[30px] text-sm font-medium transition " + (campTab === k ? "bg-[#2F2F2F] text-white ring-1 ring-white/10" : "text-zinc-400 ring-1 ring-white/15 hover:ring-white/30")}>{l}</button>
                          ))}
                        </div>
                        {campTab === "resources" ? (
                          <div className="pb-2">
                            {(c.resources && c.resources.length)
                              ? <div className="flex flex-wrap gap-3">
                                  {c.resources.map(r => (
                                    <a key={r.title} href={r.url} target={r.external ? "_blank" : undefined} rel={r.external ? "noreferrer" : undefined}
                                      className="w-[280px] rounded-[22px] overflow-hidden bg-white/[0.03] border border-white/10 hover:border-white/30 transition group flex flex-col">
                                      {r.thumb && <div className="aspect-video w-full overflow-hidden"><img src={r.thumb} alt="" className="w-full h-full object-cover group-hover:scale-[1.03] transition duration-300" /></div>}
                                      <div className="p-4 flex flex-col gap-1.5">
                                      <div className="flex items-center justify-between gap-2">
                                        <span className="text-sm font-semibold text-white">{r.title}</span>
                                        <span className="text-zinc-500 group-hover:text-zinc-200 transition">
                                          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><path d="M15 3h6v6"/><path d="M10 14L21 3"/></svg>
                                        </span>
                                      </div>
                                      <p className="text-[13px] leading-relaxed text-zinc-400">{r.desc}</p>

                                    </a>

                              : <div className="flex min-h-[120px] items-center justify-center rounded-[22px] border border-white/10 bg-white/[0.03] px-6 text-sm font-medium text-zinc-500">No resources for this campaign yet.</div>}
                          </div>
                        ) : (

                        <div className="mt-5 grid grid-cols-1 md:grid-cols-2 gap-5 max-w-3xl">

                            <div className="text-[10px] uppercase tracking-wider text-zinc-500 font-semibold mb-2">Target</div>

                          </div>
                          <div>
                            <div className="text-[10px] uppercase tracking-wider text-zinc-500 font-semibold mb-2">Positioning</div>
                            <p className="text-sm leading-relaxed text-zinc-300">{c.positioning}</p>

                        <div className="mt-7 mb-2 flex items-center justify-between">
                          <div className="text-[10px] uppercase tracking-wider text-zinc-500 font-semibold">Example hooks</div>

                            <button onClick={(e) => { const r = e.currentTarget.closest("div").parentElement.nextElementSibling; const c = r.querySelector(".snap-start"); r.scrollBy({ left: -((c ? c.getBoundingClientRect().width : 300) + 16), behavior: "smooth" }); }} aria-label="Scroll left" className="w-7 h-7 flex items-center justify-center rounded-full bg-white/[0.05] border border-white/10 text-zinc-400 hover:text-white transition">←</button>
                            <button onClick={(e) => { const r = e.currentTarget.closest("div").parentElement.nextElementSibling; const c = r.querySelector(".snap-start"); r.scrollBy({ left: (c ? c.getBoundingClientRect().width : 300) + 16, behavior: "smooth" }); }} aria-label="Scroll right" className="w-7 h-7 flex items-center justify-center rounded-full bg-white/[0.05] border border-white/10 text-zinc-400 hover:text-white transition">→</button>
                          </div>
                        </div>
                        <div className="hscroll flex gap-4 overflow-x-auto snap-x pb-4 pt-1 -mx-2 px-2">
                          {c.examples.map(h => (
                            <button key={h} onClick={() => navigator.clipboard.writeText(h).then(() => { if (window.__toast) window.__toast("Copied to clipboard"); })}
                              className="snap-start shrink-0 w-[300px] text-left p-4 rounded-[22px] bg-white/[0.03] border border-white/10 hover:border-white/30 transition group flex flex-col gap-3">

                              <span className="text-zinc-500 group-hover:text-zinc-300 transition"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg></span>
                            </button>
                          ))}
                        </div>
                        <div className="text-[10px] uppercase tracking-wider text-zinc-500 font-semibold mt-7 mb-3">Assets</div>
                        {tagged.length
                          ? <div className="flex flex-wrap gap-6 justify-center md:justify-start">
                              {tagged.map(d => {
                                const t = templates.find(x => x.id === d.templateId);
                                const rec = demoRecs[d.id];
                                return <DemoCard key={d.id} t={t} d={d} rec={rec} pre={demoPreload(rec)} uniform={true} onOpen={() => { setOpenCampaign(null); openDemo(d.id); }} onPreview={() => setPreview(d.id)} onRender={() => renderDemoMp4(d.id, true)} onTag={(camp) => tagDemo(d.id, camp)} onDuplicate={() => duplicateDemo(d.id)} onDelete={(e) => deleteDemo(d.id, e)} onCopyAssets={() => copyAssets(d.id)} onPasteAssets={() => pasteAssetsIntoDemo(d.id)} canPaste={!!assetClip} />;
                              })}
                            </div>
                          : <div className="flex min-h-[120px] items-center justify-center rounded-[22px] border border-white/10 bg-white/[0.03] px-6 text-sm font-medium text-zinc-500">{IS_LOCAL ? "No assets tagged yet. Tag one from the Assets page ⋯ menu." : "No assets yet. Check back soon."}</div>}
                        </React.Fragment>
                        )}
                      </div>
                    </div>
                    </div>
                  </div>
                );
              })()}
            </div>
          ) : page === "tutorials" ? (
            (() => {
              const vids = CAMPAIGNS.flatMap(c => (c.resources || []).filter(r => r.thumb || /youtube\.com|youtu\.be/.test(r.url)).map(r => ({ ...r, campaign: c })));
              const withVids = CAMPAIGNS.filter(c => vids.some(v => v.campaign.id === c.id));
              const shownRaw = vids.filter(v => tutFilter === "all" || v.campaign.id === tutFilter);
              const seenUrl = new Set();
              const shown = shownRaw.filter(v => { if (seenUrl.has(v.url)) return false; seenUrl.add(v.url); return true; });
              return (
                <div>
                  <FilterFab options={[["all", "All"], ...withVids.map(c => [c.id, c.title])]} value={tutFilter} onChange={setTutFilter} />
                  <div className="hidden md:flex items-center justify-start gap-2 mb-8 flex-wrap">
                    {chipBtn("all", "All", tutFilter, setTutFilter)}
                    {withVids.map(c => chipBtn(c.id, c.title, tutFilter, setTutFilter))}
                  </div>
                  <div className="flex flex-wrap gap-5 justify-center md:justify-start">
                    {shown.map(v => (
                      <a key={v.url + v.campaign.id} href={v.url} target="_blank" rel="noreferrer"
                        className="w-[336px] rounded-[30px] overflow-hidden bg-white/[0.03] border border-white/10 hover:border-white/30 transition group flex flex-col">
                        {v.thumb && <div className="aspect-video w-full overflow-hidden"><img src={v.thumb} alt="" className="w-full h-full object-cover group-hover:scale-[1.03] transition duration-300" /></div>}
                        <div className="p-4 flex flex-col gap-1.5">
                          <span className="text-sm font-semibold text-white leading-snug">{v.title}</span>

                        </div>
                      </a>
                    ))}
                  </div>
                  {!shown.length && <div className="flex min-h-[140px] items-center justify-center rounded-[30px] border border-white/10 bg-white/[0.03] text-sm font-medium text-zinc-500">No tutorials yet. Add YouTube links to campaign resources and they show up here.</div>}
                </div>
              );
            })()
          ) : page === "hooks" ? (
            <HooksPage />
          ) : page === "brand" ? (
            <BrandPage />
          ) : page === "templates" ? (
            <div>
              <FilterFab options={[["all", "All"], ["16:9", "Horizontal"], ["9:16", "Vertical"], ["1:1", "Square"]]} value={tplFilter} onChange={setTplFilter} />
              <header className="hidden md:flex flex-wrap items-center gap-4 mb-8">
                <div className="flex items-center gap-2 flex-1">
                  {chip("all", "All")}{chip("16:9", "Horizontal")}{chip("9:16", "Vertical")}{chip("1:1", "Square")}
                  <div className="ml-auto"><SortMenu value={tplSort} onChange={setTplSort} options={[["new", "Newest"], ["old", "Oldest"], ["pop", "Most popular"]]} /></div>
                </div>
              </header>
              <div className="flex flex-wrap gap-6 justify-center md:justify-start">
                {shownTemplates.map(t => {
                  const CW = (tplFilter === "16:9" || tplFilter === "1:1") ? 336 : 248;
                  const uniform = tplFilter === "all";
                  const CH = uniform ? Math.round(CW * 16 / 9) : Math.round(t.height * (CW / t.width));
                  const sc = uniform ? Math.min(CW / t.width, CH / t.height) : CW / t.width;
                  const ox = (CW - t.width * sc) / 2, oy = (CH - t.height * sc) / 2;
                  return (
                    <button key={t.id} onClick={() => { editingDemoRef.current = null; resetTemplateSession(t.id); setSel(t.id); }} className="text-left group/card" style={{ width: CW }}>
                      <div className="relative overflow-hidden rounded-[30px] bg-white/[0.03] border border-white/10 group-hover/card:border-white/25 shadow-sm group-hover/card:shadow-xl group-hover/card:shadow-black/[.08] group-hover/card:-translate-y-0.5 transition-all duration-200" style={{ width: CW, height: CH }}>
                        <div className="pointer-events-none absolute" style={{ width: t.width, height: t.height, transform: `translate(${ox}px, ${oy}px) scale(${sc})`, transformOrigin: "top left" }}><TplPreview t={t} d={tplDefaults[t.id]} pre={tplDefaults[t.id] ? demoPreload(tplDefaults[t.id]) : undefined} /></div>
                        <div className="absolute inset-0 flex flex-col items-center justify-center gap-2 bg-zinc-950/0 group-hover/card:bg-zinc-950/30 opacity-0 group-hover/card:opacity-100 transition duration-200">
                          <span className="px-3.5 py-1.5 rounded-[30px] bg-white text-zinc-900 text-sm font-medium shadow-lg">Use template</span>
                          {IS_LOCAL && <span onClick={(e) => { e.stopPropagation(); e.preventDefault(); duplicateTemplate(t); }}
                            className="px-3.5 py-1.5 rounded-[30px] bg-white/15 text-white text-sm font-medium ring-1 ring-white/30 backdrop-blur shadow-lg hover:bg-white/25 transition">Duplicate</span>}
                          {IS_LOCAL && <span onClick={(e) => { e.stopPropagation(); e.preventDefault(); deleteTemplate(t); }}
                            className="px-3.5 py-1.5 rounded-[30px] bg-red-500/20 text-red-200 text-sm font-medium ring-1 ring-red-400/30 backdrop-blur shadow-lg hover:bg-red-500/30 transition">Delete</span>}
                        </div>
                      </div>
                    </button>
                  );
                })}
              </div>
              {!shownTemplates.length && <div className="text-center py-24 text-sm text-zinc-400">No templates match — clear the search or filter.</div>}
            </div>
          ) : (
            <div>{demosView}</div>
          )}
        </div>
      </main>
      {previewModal}
      {toastEl}
      {picker && <LogoPicker onPick={(uri) => { picker.cb(uri); setPicker(null); }} onClose={() => setPicker(null)} />}
    </div>
  );
}

function LogoPicker({ onPick, onClose }) {
  const upload = () => { const i = document.createElement("input"); i.type = "file"; i.accept = "image/*,.svg"; i.onchange = e => { const f = e.target.files[0]; if (f) onPick(URL.createObjectURL(f)); }; i.click(); };
  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center bg-neutral-900/30 backdrop-blur-sm" onClick={onClose}>
      <div className="bg-[#212121] rounded-[30px] p-6 w-[440px] max-w-[92vw] shadow-2xl" onClick={e => e.stopPropagation()}>
        <div className="flex items-center justify-between mb-5">
          <div className="text-zinc-100 font-semibold text-lg">Choose a logo</div>
          <button onClick={onClose} className="w-8 h-8 flex items-center justify-center rounded-[30px] text-zinc-400 hover:bg-white/10 transition">✕</button>
        </div>
        <div className="grid grid-cols-4 gap-3">
          {LOGO_LIBRARY.map(l => (
            <button key={l.name} onClick={() => onPick(l.uri)} title={l.name} className="aspect-square rounded-[30px] bg-white ring-1 ring-white/10 hover:ring-white flex items-center justify-center p-3.5 transition">
              <img src={l.uri} alt={l.name} className="w-full h-full object-contain" />
            </button>
          ))}
        </div>
        <button onClick={upload} className="mt-4 w-full py-3 rounded-[30px] bg-neutral-900 hover:bg-neutral-800 text-white font-medium transition">Upload your own image…</button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
