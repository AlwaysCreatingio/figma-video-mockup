/* dominant (most common opaque) color of a logo image — used as the default tile background.
   Library logos are precomputed in window.__LOGO_BG; everything else is sampled on a canvas. */
window.__logoDominant = function (uri) {
  window.__logoBgCache = window.__logoBgCache || {};
  const pre = (window.__LOGO_BG || {})[uri];
  if (pre) return Promise.resolve(pre);
  if (window.__logoBgCache[uri]) return Promise.resolve(window.__logoBgCache[uri]);
  return new Promise(res => {
    const img = new Image();
    img.onload = function () {
      try {
        const N = 48, c = document.createElement("canvas"); c.width = N; c.height = N;
        const ctx = c.getContext("2d"); ctx.drawImage(img, 0, 0, N, N);
        const d = ctx.getImageData(0, 0, N, N).data, m = {};
        for (let i = 0; i < d.length; i += 4) {
          if (d[i + 3] < 128) continue;
          const key = ((d[i] >> 4) << 8) | ((d[i + 1] >> 4) << 4) | (d[i + 2] >> 4);
          const s = m[key] || (m[key] = { n: 0, r: 0, g: 0, b: 0 });
          s.n++; s.r += d[i]; s.g += d[i + 1]; s.b += d[i + 2];
        }
        let best = null; for (const k in m) if (!best || m[k].n > best.n) best = m[k];
        let hex = null;
        if (best) hex = "#" + [best.r / best.n, best.g / best.n, best.b / best.n].map(v => Math.round(v).toString(16).padStart(2, "0")).join("");
        if (hex) window.__logoBgCache[uri] = hex;
        res(hex);
      } catch (e) { res(null); }
    };
    img.onerror = function () { res(null); };
    img.src = uri;
  });
};

const STYLE_PROPS = ["fontFamily", "fontWeight", "fontSize", "color", "textAlign", "fontStyle", "textDecoration", "letterSpacing", "backgroundColor", "backgroundImage", "opacity", "borderRadius"];
function parseColor(str) {
  const m = (str || "").match(/[\d.]+/g);
  if (!m) return { hex: "#ffffff", a: 1 };
  const a = m.length > 3 ? +m[3] : 1;
  const hex = "#" + m.slice(0, 3).map(x => Math.round(+x).toString(16).padStart(2, "0")).join("");
  return { hex, a };
}
function pathOf(el, root) { const idx = []; let n = el; while (n && n !== root) { const p = n.parentNode; if (!p) break; idx.unshift(Array.prototype.indexOf.call(p.children, n)); n = p; } return idx.join("."); }
function nodeAt(root, path) { if (path === "") return root; let n = root; for (const i of path.split(".")) { if (!n) return null; n = n.children[+i]; } return n; }
const INLINE_TAGS = ["SPAN", "A", "B", "I", "EM", "STRONG", "BR"];
function isTextLeaf(el) {
  if (!el || el.nodeType !== 1) return false;
  const t = el.tagName;
  if (t === "INPUT") return true;
  if (!["P", "SPAN", "H1", "H2", "H3", "H4", "H5", "H6", "A"].includes(t)) return false;
  if (el.closest(".cursor-pointer")) return false;
  if (el.textContent.trim().length === 0) return false;
  const p = el.parentElement;
  if (p && ["P", "H1", "H2", "H3", "H4", "H5", "H6"].includes(p.tagName)) return false; // inner span → its block is the unit
  for (const c of el.children) if (!INLINE_TAGS.includes(c.tagName)) return false;
  return true;
}
// resolve a click target to its whole text box (e.g. a <span> inside a caption <p> → the <p>)
function textUnit(el) {
  let n = el.closest("p,h1,h2,h3,h4,h5,h6,input,a,span");
  if (!n) return null;
  while (n.parentElement && ["P", "H1", "H2", "H3", "H4", "H5", "H6"].includes(n.parentElement.tagName)) n = n.parentElement;
  return n;
}

/* ---------- demos persistence (IndexedDB holds the media-heavy records; localStorage holds a light index) ---------- */
function idbOpen() {
  return new Promise((res, rej) => {
    const r = indexedDB.open("aoDemos", 1);
    r.onupgradeneeded = () => r.result.createObjectStore("demos", { keyPath: "id" });
    r.onsuccess = () => res(r.result);
    r.onerror = () => rej(r.error);
  });
}
async function idbPut(rec) { const db = await idbOpen(); return new Promise((res, rej) => { const tx = db.transaction("demos", "readwrite"); tx.objectStore("demos").put(rec); tx.oncomplete = () => res(); tx.onerror = () => rej(tx.error); }); }
async function idbGet(id) { const db = await idbOpen(); return new Promise((res, rej) => { const tx = db.transaction("demos", "readonly"); const g = tx.objectStore("demos").get(id); g.onsuccess = () => res(g.result); g.onerror = () => rej(g.error); }); }
async function idbDel(id) { const db = await idbOpen(); return new Promise((res, rej) => { const tx = db.transaction("demos", "readwrite"); tx.objectStore("demos").delete(id); tx.oncomplete = () => res(); tx.onerror = () => rej(tx.error); }); }
const toDataURL = (blob) => new Promise(r => { const fr = new FileReader(); fr.onload = () => r(fr.result); fr.readAsDataURL(blob); });
const srcToDataURL = async (src) => (src && src.startsWith("blob:")) ? toDataURL(await fetch(src).then(r => r.blob())) : src;

/* Demo store: cloud (Supabase) when window.__SUPABASE is configured, else local (IndexedDB).
   Records look the same to the app: { id, name, templateId, thumb, vids{slot:{url,img}},
   logos, boxText, showPlus, hiddenLogos, overrides }. On save, rec.vids holds { blob, img, type }. */
const SB = (typeof window !== "undefined" && window.__SUPABASE && window.__SUPABASE.url && window.supabase)
  ? window.supabase.createClient(window.__SUPABASE.url, window.__SUPABASE.anonKey) : null;
const SB_BUCKET = "demo-media";
const demoStore = {
  cloud: !!SB,
  async list() {
    if (SB) {
      const { data, error } = await SB.from("demos").select("*").order("created_at", { ascending: false });
      if (error) { console.warn("[supabase] list:", error.message); return []; }
      return (data || []).map(r => ({ id: r.id, name: r.name, templateId: r.template_id, thumb: r.thumb, ...(r.payload || {}) }));
    }
    const db = await idbOpen();
    return new Promise(res => { const g = db.transaction("demos", "readonly").objectStore("demos").getAll(); g.onsuccess = () => res((g.result || []).sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0))); g.onerror = () => res([]); });
  },
  async save(rec) {
    if (SB) {
      const vids = {};
      for (const k in rec.vids) {
        const v = rec.vids[k], ext = ((v.type || "video/mp4").split("/")[1] || "bin").split(";")[0], p = rec.id + "/" + k + "." + ext;
        const up = await SB.storage.from(SB_BUCKET).upload(p, v.blob, { upsert: true, contentType: v.type });
        if (up.error) console.warn("[supabase] upload:", up.error.message);
        vids[k] = { url: SB.storage.from(SB_BUCKET).getPublicUrl(p).data.publicUrl, img: v.img };
      }
      const { error } = await SB.from("demos").insert({ id: rec.id, name: rec.name, template_id: rec.templateId, thumb: rec.thumb, payload: { vids, logos: rec.logos, boxText: rec.boxText, showPlus: rec.showPlus, hiddenLogos: rec.hiddenLogos, logosHidden: rec.logosHidden, mediaXf: rec.mediaXf, overrides: rec.overrides } });
      if (error) { console.warn("[supabase] insert:", error.message); throw error; }
      return;
    }
    const vids = {};
    for (const k in rec.vids) vids[k] = { url: await toDataURL(rec.vids[k].blob), img: rec.vids[k].img };
    return idbPut({ ...rec, vids, createdAt: Date.now() });
  },
  async remove(id) {
    if (SB) {
      const { data } = await SB.storage.from(SB_BUCKET).list(id);
      if (data && data.length) await SB.storage.from(SB_BUCKET).remove(data.map(f => id + "/" + f.name));
      await SB.from("demos").delete().eq("id", id);
      return;
    }
    return idbDel(id);
  },
};

/* a demo gallery card: renders the real template with its saved media/logos, then applies the saved
   text/style overrides so the thumbnail matches exactly what was saved (not the template defaults). */
function DemoCard({ t, d, rec, pre, onOpen, onDelete }) {
  const ref = useRef(null);
  const sc = 200 / t.width;
  useEffect(() => {
    if (!rec || !rec.overrides) return;
    const apply = () => {
      const base = ref.current; if (!base) return;
      for (const path in rec.overrides) {
        const el = nodeAt(base, path); if (!el) continue;
        const o = rec.overrides[path];
        if (el.tagName === "INPUT") { if (o.text != null) { el.value = o.text; el.setAttribute("value", o.text); } }
        else if (o.html != null) el.innerHTML = o.html;
        else if (o.text != null) el.textContent = o.text;
        if (o.style) for (const k of STYLE_PROPS) if (o.style[k] != null) el.style[k] = o.style[k];
      }
      for (const k in (rec.mediaXf || {})) {
        const m = base.querySelector('[data-vslot="' + k + '"] video, [data-vslot="' + k + '"] img');
        if (m) {
          const t = rec.mediaXf[k];
          const pad = t.fit === "contain" ? (t.pad != null ? t.pad : 14) : 0;
          m.style.width = pad ? `calc(100% - ${pad * 2}px)` : "100%";
          m.style.height = pad ? `calc(100% - ${pad * 2}px)` : "100%";
          m.style.objectFit = "cover";
          m.style.transform = `translate(${t.x || 0}px, ${t.y || 0}px) scale(${t.s || 1})`;
          m.style.transformOrigin = "center";
        }
      }
    };
    const ids = [80, 400, 900].map(ms => setTimeout(apply, ms)); // re-apply across the template's async settling
    return () => ids.forEach(clearTimeout);
  }, [rec]);
  return (
    <div className="text-left group w-[200px]">
      <button onClick={onOpen} className="block w-full text-left">
        <div className="rounded-2xl overflow-hidden bg-neutral-900 ring-1 ring-neutral-200 group-hover:ring-neutral-300 shadow-sm group-hover:shadow-xl group-hover:shadow-black/[.07] group-hover:-translate-y-0.5 transition-all duration-200 relative" style={{ width: 200, height: t.height * sc }}>
          {pre
            ? <div ref={ref} className="pointer-events-none" style={{ width: t.width, height: t.height, transform: `scale(${sc})`, transformOrigin: "top left" }}><t.Component preload={pre} /></div>
            : (d.thumb ? <img src={d.thumb} className="w-full h-full object-cover" /> : null)}
        </div>
        <div className="mt-2.5 text-sm font-medium truncate">{d.name}</div>
      </button>
    </div>
  );
}

const routeFromHash = () => {
  const parts = (typeof location !== "undefined" ? location.hash || "" : "").replace(/^#\/?/, "").split("/");
  if (parts[0] === "template" && parts[1]) return { sel: decodeURIComponent(parts[1]), page: "templates" };
  if (parts[0] === "demos") return { sel: null, page: "demos" };
  if (parts[0] === "projects") return { sel: null, page: "showcase" };
  return { sel: null, page: "templates" };
};

function App() {
  const [sel, setSel] = useState(() => routeFromHash().sel);
  const [editMode, setEditMode] = useState(true);

  const refreshDemos = async () => { const list = await demoStore.list(); setDemos(list); const m = {}; list.forEach(r => m[r.id] = r); setDemoRecs(m); };
  useEffect(() => { refreshDemos(); }, []);
  const demoPreload = (rec) => rec ? {
    vids: rec.vids || {},
    boxText: rec.boxText || {},
    showPlus: rec.showPlus,
    hiddenLogos: rec.hiddenLogos || {},
    logosHidden: rec.logosHidden,
    logos: Object.fromEntries(Object.entries(rec.logos || {}).map(([k, v]) => [k, v.uri])),
    logoScales: Object.fromEntries(Object.entries(rec.logos || {}).map(([k, v]) => [k, v.scale])),
    logoBgs: Object.fromEntries(Object.entries(rec.logos || {}).map(([k, v]) => [k, v.bg])),
  } : null;
  const [, force] = useState(0);

  const overrides = useRef({});
  const mediaXf = useRef({});          // per-template media pan/zoom: { slot: { x, y, s } }
  const dragRef = useRef(null);
  const editorScaleRef = useRef(1);
  const containerRef = useRef(null);
  const applyingRef = useRef(false);
  const activeRef = useRef(null);
  const suppressRef = useRef(false);
  const templates = (window.TEMPLATES || []).slice().sort((a, b) => a.name.localeCompare(b.name));
  useEffect(() => { const f = () => force(x => x + 1); window.addEventListener("resize", f); return () => window.removeEventListener("resize", f); }, []);
  useEffect(() => { window.__logoPicker = (cb) => setPicker({ cb }); return () => { delete window.__logoPicker; }; }, []);
  // logo tiles register themselves here on click → show the Logo inspector (replace / size / background)
  useEffect(() => {
    window.__selectLogo = (api) => { clearActive(); setInsp({ isLogo: true, logoApi: api, logoScale: api.scale != null ? api.scale : 1, logoBg: api.bg || "#ffffff" }); };
    return () => { delete window.__selectLogo; };
  }, []);
  // a slot can register text: __editText focuses its text layer and opens the text inspector (even when empty)
  useEffect(() => {
    window.__editText = (el) => { if (el) { el.style.pointerEvents = "auto"; selectEl(el, true); } };
    return () => { delete window.__editText; };
  }, []);
  // hash routing: #/templates, #/projects, #/template/<id> — gives every template its own URL
  useEffect(() => {
    const apply = () => {
      const parts = (location.hash || "").replace(/^#\/?/, "").split("/");
      if (parts[0] === "template" && parts[1]) { setSel(decodeURIComponent(parts[1])); setPage("templates"); }
      else if (parts[0] === "demos") { setSel(null); setPage("demos"); }
      else if (parts[0] === "projects") { setSel(null); setPage("showcase"); }
      else { setSel(null); setPage("templates"); }
    };
    apply();
    window.addEventListener("hashchange", apply);
    return () => window.removeEventListener("hashchange", apply);
  }, []);
  useEffect(() => {
    const want = sel ? "#/template/" + sel : (page === "demos" ? "#/demos" : page === "showcase" ? "#/projects" : "#/templates");
    if (location.hash !== want) location.hash = want;
  }, [sel, page]);
  const ovFor = (id) => (overrides.current[id] = overrides.current[id] || {});
  const xfFor = (id) => (mediaXf.current[id] = mediaXf.current[id] || {});
  const applyXf = (root, id) => {
    const xf = xfFor(id);
    for (const k in xf) {
      const m = root.querySelector('[data-vslot="' + k + '"] video, [data-vslot="' + k + '"] img');
      if (m) {
        const t = xf[k];
        const pad = t.fit === "contain" ? (t.pad != null ? t.pad : 14) : 0;   // "Fit" = even inset on all sides

                <button onClick={deselect} title="Deselect" className="w-7 h-7 flex items-center justify-center text-xs rounded-lg text-neutral-500 bg-neutral-100 hover:bg-neutral-200 transition">✕</button>
              </div>
              <button onClick={() => insp.logoApi.replace()} className="w-full px-3 py-2.5 rounded-xl bg-[#6d5efc] hover:brightness-105 text-white text-sm font-medium shadow-sm shadow-[#6d5efc]/30 transition">Replace logo…</button>
              <section className="space-y-3">
                <div className="text-[11px] uppercase tracking-wider text-neutral-400 font-semibold">Logo</div>
                <div>
                  <label className={LBL}>Logo size · {Math.round(insp.logoScale * 100)}%</label>
                  <input type="range" min="20" max="200" value={Math.round(insp.logoScale * 100)}
                    onChange={e => { const s = +e.target.value / 100; insp.logoApi.setScale(s); setInsp({ ...insp, logoScale: s }); }}
                    className="w-full accent-[#6d5efc]" />
                  <p className="text-xs text-neutral-400 mt-1 leading-relaxed">Resizes the logo inside the tile — the tile itself stays the same size.</p>
                </div>
                <div>
                  <label className={LBL}>Background</label>
                  <div className="flex items-center gap-2">
                    <label className="relative w-9 h-9 rounded-xl border border-neutral-200 overflow-hidden cursor-pointer shrink-0" style={{ background: insp.logoBg }}>
                      <input type="color" value={insp.logoBg} onChange={e => { insp.logoApi.setBg(e.target.value); setInsp({ ...insp, logoBg: e.target.value }); }} className="absolute inset-0 opacity-0 cursor-pointer" />
                    </label>
                    <span className="text-sm text-neutral-500 flex-1">{insp.logoBg}</span>
                  </div>
                  <p className="text-xs text-neutral-400 mt-1 leading-relaxed">Defaults to the logo's main color.</p>
                </div>
              </section>
              {insp.logoApi.remove && <button onClick={() => { insp.logoApi.remove(); deselect(); }} className="w-full px-3 py-2 rounded-xl text-sm font-medium text-red-600 bg-red-50 hover:bg-red-100 transition">Remove this logo</button>}
            </div>}

            {insp && !insp.isLogo && !insp.isMedia && <div className="space-y-5">
              <div className="flex items-center justify-between">
                <span className="text-[11px] uppercase tracking-wider text-neutral-400 font-semibold">{insp.isText ? "Text" : insp.isSlot ? "Media slot" : "Element"}</span>
                <div className="flex gap-1.5">
                  {insp.hasParent && <button onClick={selectParent} title="Select parent" className="px-2 py-1 text-xs rounded-lg text-neutral-600 bg-neutral-100 hover:bg-neutral-200 transition">↑ parent</button>}
                  <button onClick={deselect} title="Deselect" className="w-7 h-7 flex items-center justify-center text-xs rounded-lg text-neutral-500 bg-neutral-100 hover:bg-neutral-200 transition">✕</button>
                </div>
              </div>

              {insp.isSlot && <button onClick={uploadIntoSlot} className="w-full px-3 py-2.5 rounded-xl bg-[#6d5efc] hover:brightness-105 text-white text-sm font-medium shadow-sm shadow-[#6d5efc]/30 transition">Upload media into slot</button>}

              <section className="space-y-3">
                <div className="text-[11px] uppercase tracking-wider text-neutral-400 font-semibold">Appearance</div>
                <div>
                  <label className={LBL}>Background</label>
                  <div className="flex items-center gap-2">
                    <label className="relative w-9 h-9 rounded-xl border border-neutral-200 overflow-hidden cursor-pointer shrink-0" style={{ background: insp.bgTransparent ? "repeating-conic-gradient(#eee 0 25%, #fff 0 50%) 50%/12px 12px" : insp.bgHex }}>
                      <input type="color" value={insp.bgHex} onChange={e => setStyle("backgroundColor", e.target.value, { bgHex: e.target.value, bgTransparent: false })} className="absolute inset-0 opacity-0 cursor-pointer" />
                    </label>
                    <span className="text-sm text-neutral-500 flex-1">{insp.bgTransparent ? "None" : insp.bgHex}</span>
                    <button onClick={() => setStyle("backgroundColor", "transparent", { bgTransparent: true })} className={"px-2.5 py-1 text-xs rounded-lg transition " + (insp.bgTransparent ? "bg-[#6d5efc] text-white" : "bg-neutral-100 text-neutral-600 hover:bg-neutral-200")}>Clear</button>
                  </div>
                </div>
                <div>
                  <label className={LBL}>Opacity · {insp.opacity}%</label>
                  <input type="range" min="0" max="100" value={insp.opacity} onChange={e => setStyle("opacity", (+e.target.value / 100).toString(), { opacity: +e.target.value })} className="w-full accent-[#6d5efc]" />
                </div>
                <div>
                  <label className={LBL}>Corner radius</label>
                  <input type="number" min="0" value={insp.radius} onChange={e => setStyle("borderRadius", (+e.target.value) + "px", { radius: +e.target.value })} className={FIELD} />
                </div>
              </section>

              {insp.isText && <section className="space-y-3">
                <div className="text-[11px] uppercase tracking-wider text-neutral-400 font-semibold">Text</div>
                <div>
                  <label className={LBL}>Font</label>
                  <select value={insp.font} onChange={e => setStyle("fontFamily", e.target.value + ",sans-serif", { font: e.target.value })} className={FIELD}>
                    {FONTS.map(f => <option key={f} value={f}>{f}</option>)}
                  </select>
                </div>
                <div className="flex gap-2">
                  <div className="flex-1">
                    <label className={LBL}>Weight</label>
                    <select value={insp.weight} onChange={e => setStyle("fontWeight", e.target.value, { weight: +e.target.value })} className={FIELD}>
                      {WEIGHTS.map(([n, w]) => <option key={w} value={w}>{n}</option>)}
                    </select>
                  </div>
                  <div className="w-[86px]">
                    <label className={LBL}>Size</label>
                    <input type="number" value={insp.size} onChange={e => setStyle("fontSize", e.target.value + "px", { size: +e.target.value })} className={FIELD} />
                  </div>
                </div>
                <div>
                  <label className={LBL}>Color</label>
                  <div className="flex items-center gap-2">
                    <label className="relative w-9 h-9 rounded-xl border border-neutral-200 overflow-hidden cursor-pointer shrink-0" style={{ background: insp.color }}>
                      <input type="color" value={insp.color} onChange={e => setStyle("color", e.target.value, { color: e.target.value })} className="absolute inset-0 opacity-0 cursor-pointer" />
                    </label>
                    <span className="text-sm text-neutral-500">{insp.color}</span>
                  </div>
                </div>
                <div>
                  <label className={LBL}>Alignment & style</label>
                  <div className="flex gap-2">
                    <div className="flex rounded-xl overflow-hidden border border-neutral-200 bg-neutral-100">
                      {["left", "center", "right"].map(a => <button key={a} onClick={() => setStyle("textAlign", a, { align: a })} className={insp.align === a ? SEG_ON : SEG}>{a[0].toUpperCase()}</button>)}
                    </div>
                    <button onClick={() => setStyle("fontStyle", insp.italic ? "normal" : "italic", { italic: !insp.italic })} className={"px-3 py-1.5 rounded-xl italic text-sm border border-neutral-200 " + (insp.italic ? "bg-[#6d5efc] text-white border-transparent" : "bg-neutral-100 text-neutral-600 hover:bg-neutral-200")}>I</button>
                    <button onClick={() => setStyle("textDecoration", insp.underline ? "none" : "underline", { underline: !insp.underline })} className={"px-3 py-1.5 rounded-xl underline text-sm border border-neutral-200 " + (insp.underline ? "bg-[#6d5efc] text-white border-transparent" : "bg-neutral-100 text-neutral-600 hover:bg-neutral-200")}>U</button>
                  </div>
                </div>
                <p className="text-xs text-neutral-400 leading-relaxed">Type on the highlighted text to change the words.</p>
              </section>}
            </div>}
          </div>

          <div className="px-5 py-4 border-t border-neutral-100 space-y-2">
            <button onClick={saveDemo}
              className="w-full text-sm px-3 py-2.5 rounded-xl bg-neutral-100 hover:bg-neutral-200 text-neutral-800 font-medium transition">
              {saved === "saving" ? "Saving…" : saved ? "Saved to Demos ✓" : "Save to Demos"}</button>
            <button onClick={exportMp4} disabled={exporting}
              className="w-full text-sm px-3 py-2.5 rounded-xl bg-neutral-900 hover:bg-neutral-800 text-white font-medium transition disabled:opacity-60 disabled:cursor-wait">
              {exporting ? "Rendering MP4…" : "Export MP4"}</button>
          </div>
        </aside>

        <main className="flex-1 h-screen flex items-center justify-center p-12 overflow-auto relative">
          <div style={{ width: t.width * s, height: t.height * s }} className="overflow-hidden rounded-2xl shadow-[0_20px_60px_-15px_rgba(0,0,0,.25)] shrink-0">
            <div ref={containerRef} onClickCapture={onEditorClick} onInput={onTextInput} onPointerDown={onMediaDragStart}
              style={{ width: t.width, height: t.height, transform: `scale(${s})`, transformOrigin: "top left" }}>
              <t.Component />
            </div>
          </div>
          <button onClick={() => setSoundOn(v => !v)} title={soundOn ? "Mute preview" : "Play sound"}
            className={"absolute bottom-6 right-6 w-11 h-11 flex items-center justify-center rounded-full shadow-lg transition " + (soundOn ? "bg-[#6d5efc] text-white" : "bg-white text-neutral-700 hover:bg-neutral-100 ring-1 ring-neutral-200")}>
            {soundOn
              ? <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M15.5 8.5a5 5 0 010 7"/><path d="M19 5a9 9 0 010 14"/></svg>
              : <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M22 9l-6 6"/><path d="M16 9l6 6"/></svg>}
          </button>
        </main>

        {picker && <LogoPicker onPick={(uri) => { picker.cb(uri); setPicker(null); }} onClose={() => setPicker(null)} />}
      </div>
    );
  }

  /* ---------- gallery / showcase (with icon nav) ---------- */
  const navBtn = (id, label, icon) => (
    <button onClick={() => setPage(id)} title={label} aria-label={label}
      className={"inline-flex items-center gap-2 h-10 px-4 rounded-xl text-sm font-medium transition " + (page === id ? "bg-neutral-900 text-white" : "text-neutral-500 hover:bg-neutral-100 hover:text-neutral-800")}>
      {icon}<span>{label}</span>
    </button>
  );
  const iconTemplates = <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>;
  const iconShowcase = <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 3l8 4.5v9L12 21l-8-4.5v-9L12 3z"/><path d="M12 12l8-4.5"/><path d="M12 12v9"/><path d="M12 12L4 7.5"/></svg>;
  const demosView = demos.length ? (
    <div className="flex flex-wrap justify-center gap-6">
      {demos.map(d => {
        const t = templates.find(x => x.id === d.templateId);
        if (!t) return null;
        const rec = demoRecs[d.id];
        return <DemoCard key={d.id} t={t} d={d} rec={rec} pre={demoPreload(rec)} onOpen={() => openDemo(d.id)} onDelete={(e) => deleteDemo(d.id, e)} />;
      })}
    </div>
  ) : (
    <div className="text-center py-28 text-neutral-400">
      <div className="w-14 h-14 mx-auto rounded-2xl bg-neutral-100 flex items-center justify-center text-neutral-300">{iconShowcase}</div>
      <div className="mt-4 text-lg font-medium text-neutral-600">No demos yet</div>
      <p className="mt-1 text-sm">Open a template, add your videos, then hit <span className="font-medium text-neutral-600">Save to Demos</span>.</p>
    </div>
  );
  // standalone, nav-less demos page at #/demos
  if (page === "demos") {
    return (
      <div className="min-h-screen text-neutral-900">
        <div className="max-w-6xl mx-auto px-8 py-10">{demosView}</div>
        {picker && <LogoPicker onPick={(uri) => { picker.cb(uri); setPicker(null); }} onClose={() => setPicker(null)} />}
      </div>
    );
  }
  return (
    <div className="min-h-screen text-neutral-900">
      <nav className="sticky top-0 z-30 flex items-center justify-center gap-2 px-4 h-14 bg-white/85 backdrop-blur border-b border-neutral-200">
        {navBtn("templates", "Templates", iconTemplates)}
        {navBtn("showcase", "Demos", iconShowcase)}
      </nav>
      <div className="max-w-6xl mx-auto px-8 py-10">
        {page === "templates" ? (
          <div className="flex flex-wrap justify-center gap-6">
            {templates.map(t => {
              const sc = 200 / t.width;
              return (
                <button key={t.id} onClick={() => setSel(t.id)} className="text-left group w-[200px]">
                  <div className="rounded-2xl overflow-hidden bg-white ring-1 ring-neutral-200 group-hover:ring-neutral-300 shadow-sm group-hover:shadow-xl group-hover:shadow-black/[.07] group-hover:-translate-y-0.5 transition-all duration-200 relative" style={{ width: 200, height: t.height * sc }}>
                    <div className="pointer-events-none" style={{ width: t.width, height: t.height, transform: `scale(${sc})`, transformOrigin: "top left" }}><t.Component /></div>
                  </div>
                </button>
              );
            })}
          </div>
        ) : (
          demosView
        )}
      </div>
      {picker && <LogoPicker onPick={(uri) => { picker.cb(uri); setPicker(null); }} onClose={() => setPicker(null)} />}
    </div>
  );
}

function LogoPicker({ onPick, onClose }) {
  const upload = () => { const i = document.createElement("input"); i.type = "file"; i.accept = "image/*,.svg"; i.onchange = e => { const f = e.target.files[0]; if (f) onPick(URL.createObjectURL(f)); }; i.click(); };
  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center bg-neutral-900/30 backdrop-blur-sm" onClick={onClose}>
      <div className="bg-white rounded-3xl p-6 w-[440px] max-w-[92vw] shadow-2xl" onClick={e => e.stopPropagation()}>
        <div className="flex items-center justify-between mb-5">
          <div className="text-neutral-900 font-semibold text-lg">Choose a logo</div>
          <button onClick={onClose} className="w-8 h-8 flex items-center justify-center rounded-lg text-neutral-400 hover:bg-neutral-100 transition">✕</button>
        </div>
        <div className="grid grid-cols-4 gap-3">
          {LOGO_LIBRARY.map(l => (
            <button key={l.name} onClick={() => onPick(l.uri)} title={l.name} className="aspect-square rounded-2xl bg-neutral-50 ring-1 ring-neutral-200 hover:ring-[#6d5efc] hover:bg-white flex items-center justify-center p-3.5 transition">
              <img src={l.uri} alt={l.name} className="w-full h-full object-contain" />
            </button>
          ))}
        </div>
        <button onClick={upload} className="mt-4 w-full py-3 rounded-2xl bg-neutral-900 hover:bg-neutral-800 text-white font-medium transition">Upload your own image…</button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
