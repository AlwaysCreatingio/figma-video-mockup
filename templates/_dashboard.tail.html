<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* dominant (most common opaque) color of a logo image — used as the default tile background.
   Library logos are precomputed in window.__LOGO_BG; everything else is sampled on a canvas. */
window.__logoDominant = function (uri) {
  window.__logoBgCache = window.__logoBgCache || {};
  const pre = (window.__LOGO_BG || {})[uri];
  if (pre) return Promise.resolve(pre);
  if (window.__logoBgCache[uri]) return Promise.resolve(window.__logoBgCache[uri]);
  return new Promise(res => {
    const img = new Image();
    img.onload = function () {
      try {
        const N = 48, c = document.createElement("canvas"); c.width = N; c.height = N;
        const ctx = c.getContext("2d"); ctx.drawImage(img, 0, 0, N, N);
        const d = ctx.getImageData(0, 0, N, N).data, m = {};
        for (let i = 0; i < d.length; i += 4) {
          if (d[i + 3] < 128) continue;
          const key = ((d[i] >> 4) << 8) | ((d[i + 1] >> 4) << 4) | (d[i + 2] >> 4);
          const s = m[key] || (m[key] = { n: 0, r: 0, g: 0, b: 0 });
          s.n++; s.r += d[i]; s.g += d[i + 1]; s.b += d[i + 2];
        }
        let best = null; for (const k in m) if (!best || m[k].n > best.n) best = m[k];
        let hex = null;
        if (best) hex = "#" + [best.r / best.n, best.g / best.n, best.b / best.n].map(v => Math.round(v).toString(16).padStart(2, "0")).join("");
        if (hex) window.__logoBgCache[uri] = hex;
        res(hex);
      } catch (e) { res(null); }
    };
    img.onerror = function () { res(null); };
    img.src = uri;
  });
};

/* ---------- built-in SVG logo library ---------- */
function claudeSVG() {

  for (let i = 0; i < 12; i++) rays += `<rect x="46.5" y="6" width="7" height="34" rx="3.5" transform="rotate(${i * 30} 50 50)"/>`;
  return `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><g fill="#D97757">${rays}</g></svg>`;
}
function opusClipSVG() {

 3.32526 6.67474C3.32526 7.79661 3.60774 8.91041 4.1485 9.88701L4.17271 9.92736C4.85068 11.138 5.91606 12.1308 7.17514 12.7199C7.27199 12.7684 7.37691 12.8087 7.47376 12.8491C6.71509 12.1711 6.22275 11.1945 6.19047 10.1049V9.88701C6.24697 7.86118 7.87731 6.2389 9.89507 6.18241H10.2583C10.686 6.20662 10.8717 6.23083 11.0573 6.25504C11.2429 6.28733 11.3317 6.30347 11.5093 6.33575C11.59 6.3519 11.6788 6.37611 11.7998 6.40032C11.8886 6.42454 11.9451 6.44068 12.1792 6.51332C12.4052 6.59403 12.502 6.63438 12.6715 6.69895C12.8329 6.76352 12.9782 6.83616 13.0105 6.84423C14.3745 7.48184 15.5206 8.55529 16.247 9.87893L16.2793 9.93543C16.8362 10.9685 17.1348 12.1388 17.1348 13.3253C17.1348 14.3826 16.9088 15.4076 16.4649 16.36C16.368 16.5617 16.2712 16.7393 16.247 16.7797C16.1743 16.9088 16.0936 17.0379 16.0048 17.1913C15.9645 17.2559 15.908 17.3366 15.8111 17.4899C15.7062 17.6271 15.5771 17.7885 15.5286 17.845C15.3753 18.0307 15.2381 18.184 15.1897 18.2324C15.109 18.3212 15.0686 18.3616 14.891 18.5391C14.7619 18.6602 14.6812 18.7329 14.5278 18.8539C15.3027 18.5553 16.2389 17.8935 17.0541 17.0864C18.8943 15.2462 19.9354 12.8087 19.9839 10.2098V9.82244C19.9354 7.2155 18.8943 4.76998 17.0541 2.93785C15.2542 1.10573 12.8329 0.0645682 10.2502 0.00807103L10.0888 0H9.82243Z"/></g></svg>`;
}
const svgURI = (svg) => "data:image/svg+xml;utf8," + encodeURIComponent(svg);
const LOGO_LIBRARY = [
  { name: "Claude", uri: window.__CLAUDE_LOGO || svgURI(claudeSVG()) },
  { name: "Agent Opus", uri: window.__AGENT_OPUS_MARK || window.__CHANNELS_LOGO || svgURI(opusClipSVG()) },
  { name: "DeepMind", uri: svgURI(deepmindSVG()) },
  { name: "Gemini", uri: window.__GEMINI_LOGO || svgURI(claudeSVG()) },
  { name: "Suno", uri: window.__SUNO_LOGO || svgURI(claudeSVG()) },
];

/* ---------- helpers ---------- */
const FONTS = ["Geist", "Inter", "Poppins", "Montserrat", "Roboto", "Oswald", "Bebas Neue", "Playfair Display", "Georgia", "Arial", "Courier New"];
const WEIGHTS = [["Light", 300], ["Regular", 400], ["Medium", 500], ["Semibold", 600], ["Bold", 700], ["Black", 800]];
const STYLE_PROPS = ["fontFamily", "fontWeight", "fontSize", "color", "textAlign", "fontStyle", "textDecoration", "letterSpacing", "backgroundColor", "backgroundImage", "opacity", "borderRadius", "top", "right", "bottom", "left", "transform", "height", "backgroundSize"];
function parseColor(str) {
  const m = (str || "").match(/[\d.]+/g);
  if (!m) return { hex: "#ffffff", a: 1 };
  const a = m.length > 3 ? +m[3] : 1;
  const hex = "#" + m.slice(0, 3).map(x => Math.round(+x).toString(16).padStart(2, "0")).join("");
  return { hex, a };
}
function pathOf(el, root) { const idx = []; let n = el; while (n && n !== root) { const p = n.parentNode; if (!p) break; idx.unshift(Array.prototype.indexOf.call(p.children, n)); n = p; } return idx.join("."); }
function nodeAt(root, path) { if (path === "") return root; let n = root; for (const i of path.split(".")) { if (!n) return null; n = n.children[+i]; } return n; }
const INLINE_TAGS = ["SPAN", "A", "B", "I", "EM", "STRONG", "BR"];
function isTextLeaf(el) {
  if (!el || el.nodeType !== 1) return false;
  const t = el.tagName;
  if (t === "INPUT") return true;
  if (!["P", "SPAN", "H1", "H2", "H3", "H4", "H5", "H6", "A"].includes(t)) return false;
  if (el.closest(".cursor-pointer")) return false;
  if (el.textContent.trim().length === 0) return false;
  const p = el.parentElement;
  if (p && ["P", "H1", "H2", "H3", "H4", "H5", "H6"].includes(p.tagName)) return false; // inner span → its block is the unit
  for (const c of el.children) if (!INLINE_TAGS.includes(c.tagName)) return false;
  return true;
}
// resolve a click target to its whole text box (e.g. a <span> inside a caption <p> → the <p>)
function textUnit(el) {
  let n = el.closest("p,h1,h2,h3,h4,h5,h6,input,a,span");
  if (!n) return null;
  while (n.parentElement && ["P", "H1", "H2", "H3", "H4", "H5", "H6"].includes(n.parentElement.tagName)) n = n.parentElement;
  return n;
}

// owner mode: demo management (save/delete) is only exposed when running locally
const IS_LOCAL = typeof location !== "undefined" && (location.hostname === "localhost" || location.hostname === "127.0.0.1");

const aspectOf = (t) => t.width === t.height ? "1:1" : t.width > t.height ? "16:9" : "9:16";

/* light-theme class tokens */
const ACCENT = "#18181b";
const FIELD = "w-full bg-[#242424] border border-white/10 rounded-[30px] px-3 py-2 text-sm text-zinc-100 shadow-sm outline-none focus:border-white/30 focus:ring-2 focus:ring-white/10 transition";
const LBL = "block text-xs font-medium text-zinc-400 mb-1.5";

/* ---------- demos persistence (IndexedDB holds the media-heavy records; localStorage holds a light index) ---------- */
function idbOpen() {
  return new Promise((res, rej) => {
    const r = indexedDB.open("aoDemos", 1);
    r.onupgradeneeded = () => r.result.createObjectStore("demos", { keyPath: "id" });
    r.onsuccess = () => res(r.result);
    r.onerror = () => rej(r.error);
  });
}
async function idbPut(rec) { const db = await idbOpen(); return new Promise((res, rej) => { const tx = db.transaction("demos", "readwrite"); tx.objectStore("demos").put(rec); tx.oncomplete = () => res(); tx.onerror = () => rej(tx.error); }); }
async function idbGet(id) { const db = await idbOpen(); return new Promise((res, rej) => { const tx = db.transaction("demos", "readonly"); const g = tx.objectStore("demos").get(id); g.onsuccess = () => res(g.result); g.onerror = () => rej(g.error); }); }
async function idbDel(id) { const db = await idbOpen(); return new Promise((res, rej) => { const tx = db.transaction("demos", "readwrite"); tx.objectStore("demos").delete(id); tx.oncomplete = () => res(); tx.onerror = () => rej(tx.error); }); }
const toDataURL = (blob) => new Promise(r => { const fr = new FileReader(); fr.onload = () => r(fr.result); fr.readAsDataURL(blob); });
const srcToDataURL = async (src) => (src && src.startsWith("blob:")) ? toDataURL(await fetch(src).then(r => r.blob())) : src;

/* Demo store: cloud (Supabase) when window.__SUPABASE is configured, else local (IndexedDB).
   Records look the same to the app: { id, name, templateId, thumb, vids{slot:{url,img}},
   logos, boxText, showPlus, hiddenLogos, overrides }. On save, rec.vids holds { blob, img, type }. */
const SB = (typeof window !== "undefined" && window.__SUPABASE && window.__SUPABASE.url && window.supabase)
  ? window.supabase.createClient(window.__SUPABASE.url, window.__SUPABASE.anonKey) : null;
const SB_BUCKET = "demo-media";
const demoStore = {
  cloud: !!SB,
  async list() {
    if (SB) {
      const { data, error } = await SB.from("demos").select("*").order("created_at", { ascending: false });
      if (error) { console.warn("[supabase] list:", error.message); return []; }
      return (data || []).map(r => ({ id: r.id, name: r.name, templateId: r.template_id, thumb: r.thumb, ...(r.payload || {}) }));
    }
    const db = await idbOpen();
    return new Promise(res => { const g = db.transaction("demos", "readonly").objectStore("demos").getAll(); g.onsuccess = () => res((g.result || []).sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0))); g.onerror = () => res([]); });
  },
  async save(rec) {
    if (SB) {
      const vids = {};
      for (const k in rec.vids) {
        const v = rec.vids[k], ext = ((v.type || "video/mp4").split("/")[1] || "bin").split(";")[0], p = rec.id + "/" + k + "." + ext;
        const up = await SB.storage.from(SB_BUCKET).upload(p, v.blob, { upsert: true, contentType: v.type });
        if (up.error) console.warn("[supabase] upload:", up.error.message);
        vids[k] = { url: SB.storage.from(SB_BUCKET).getPublicUrl(p).data.publicUrl, img: v.img };
      }
      const { error } = await SB.from("demos").insert({ id: rec.id, name: rec.name, template_id: rec.templateId, thumb: rec.thumb, payload: { vids, logos: rec.logos, boxText: rec.boxText, labelText: rec.labelText, showPlus: rec.showPlus, hiddenLogos: rec.hiddenLogos, logosHidden: rec.logosHidden, mediaXf: rec.mediaXf, overrides: rec.overrides } });
      if (error) { console.warn("[supabase] insert:", error.message); throw error; }
      return;
    }
    const vids = {};
    for (const k in rec.vids) vids[k] = { url: await toDataURL(rec.vids[k].blob), img: rec.vids[k].img };
    return idbPut({ ...rec, vids, createdAt: Date.now() });
  },
  async remove(id) {
    if (SB) {
      const { data } = await SB.storage.from(SB_BUCKET).list(id);
      if (data && data.length) await SB.storage.from(SB_BUCKET).remove(data.map(f => id + "/" + f.name));
      await SB.from("demos").delete().eq("id", id);
      return;
    }
    return idbDel(id);
  },
  // attach the rendered MP4 to an existing demo (the demo card then plays the real output)
  async attachMp4(id, blob) {
    if (SB) {
      const p = id + "/out.mp4";
      const up = await SB.storage.from(SB_BUCKET).upload(p, blob, { upsert: true, contentType: "video/mp4" });
      if (up.error) { console.warn("[supabase] mp4 upload:", up.error.message); return; }
      const url = SB.storage.from(SB_BUCKET).getPublicUrl(p).data.publicUrl;
      // RLS only grants select/insert/delete (no update) — replace the row instead
      const { data } = await SB.from("demos").select("*").eq("id", id).single();
      if (!data) return;
      await SB.from("demos").delete().eq("id", id);
      const { error } = await SB.from("demos").insert({ ...data, payload: { ...(data.payload || {}), mp4: url } });
      if (error) console.warn("[supabase] mp4 attach:", error.message);
      return;
    }
    const rec = await idbGet(id); if (!rec) return;
    rec.mp4 = await toDataURL(blob);
    return idbPut(rec);
  },
};

/* a demo gallery card: renders the real template with its saved media/logos, then applies the saved
   text/style overrides so the thumbnail matches exactly what was saved (not the template defaults). */
/* fullscreen preview: plays the rendered MP4 (or shows the saved thumb) with a download action */
function DemoPreview({ d, t, rec, pre, onClose, onOpen }) {
  const mp4 = rec && rec.mp4;
  const ref = useRef(null);
  useDemoOverrides(ref, mp4 ? null : rec);
  const ps = t ? Math.min(860 / t.width, 560 / t.height) : 1;
  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center bg-zinc-950/60 backdrop-blur-sm p-6" onClick={onClose}>
      <div className="bg-[#212121] shadow-2xl max-w-[min(920px,94vw)] w-full overflow-hidden" onClick={e => e.stopPropagation()}>
        <div className="flex items-center justify-between px-5 py-3.5 border-b border-white/10">
          <div className="text-sm font-semibold truncate pr-4">{d.name}</div>
          <button onClick={onClose} className="w-8 h-8 flex items-center justify-center rounded-[30px] text-zinc-400 hover:bg-white/10 transition">✕</button>
        </div>
        <div className="bg-zinc-950 flex items-center justify-center">
          {mp4
            ? <video src={mp4} controls autoPlay loop muted playsInline className="max-h-[70vh] w-auto max-w-full" />
            : pre && t
              ? <div className="overflow-hidden" style={{ width: t.width * ps, height: t.height * ps }}>
                  <div ref={ref} className="pointer-events-none" style={{ width: t.width, height: t.height, transform: `scale(${ps})`, transformOrigin: "top left" }}><t.Component preload={pre} /></div>
                </div>
              : (d.thumb
                ? <img src={d.thumb} className="max-h-[70vh] w-auto max-w-full" />
                : <div className="py-24 text-sm text-zinc-500">No rendered video yet — open it in the editor to export one.</div>)}
        </div>
        <div className="flex items-center justify-end gap-2 px-5 py-3.5">
          <button onClick={onOpen} className="px-3.5 py-2 rounded-[30px] text-sm font-medium text-zinc-200 bg-white/10 hover:bg-white/15 transition">Open in editor</button>
          {mp4 && <a href={mp4} download={(d.name || "demo").replace(/[^\w]+/g, "-").toLowerCase() + ".mp4"}
            className="px-3.5 py-2 rounded-[30px] text-sm font-medium text-zinc-900 bg-white hover:bg-zinc-200 transition">Download MP4</a>}
        </div>
      </div>
    </div>
  );
}

function useDemoOverrides(ref, rec) {
  useEffect(() => {
    if (!rec || !rec.overrides) return;
    const apply = () => {
      const base = ref.current; if (!base) return;
      for (const path in rec.overrides) {
        const el = nodeAt(base, path); if (!el) continue;
        const o = rec.overrides[path];
        if (el.tagName === "INPUT") { if (o.text != null) { el.value = o.text; el.setAttribute("value", o.text); } }
        else if (o.html != null) el.innerHTML = o.html;
        else if (o.text != null) el.textContent = o.text;
        if (o.style) for (const k of STYLE_PROPS) if (o.style[k] != null) el.style[k] = o.style[k];
      }
      for (const k in (rec.mediaXf || {})) {
        const m = base.querySelector('[data-vslot="' + k + '"] video, [data-vslot="' + k + '"] img');
        if (m) {
          const t = rec.mediaXf[k];
          const pad = t.fit === "contain" ? (t.pad != null ? t.pad : 14) : 0;
          m.style.width = pad ? `calc(100% - ${pad * 2}px)` : "100%";
          m.style.height = pad ? `calc(100% - ${pad * 2}px)` : "100%";
          m.style.objectFit = "cover";
          m.style.transform = `translate(${t.x || 0}px, ${t.y || 0}px) scale(${t.s || 1})`;
          m.style.transformOrigin = "center";
        }
      }
    };
    const ids = [80, 400, 900].map(ms => setTimeout(apply, ms)); // re-apply across the template's async settling
    return () => ids.forEach(clearTimeout);
  }, [rec]);
}

function DemoCard({ t, d, rec, pre, uniform, onOpen, onPreview, onDelete }) {
  const ref = useRef(null);
  const [menu, setMenu] = useState(false);
  const CW = 248;
  const CH = uniform !== false ? Math.round(CW * 16 / 9) : Math.round(t.height * (CW / t.width));
  const sc = uniform !== false ? Math.min(CW / t.width, CH / t.height) : CW / t.width;
  const ox = (CW - t.width * sc) / 2, oy = (CH - t.height * sc) / 2;
  const mp4 = rec && rec.mp4;
  useEffect(() => {
    if (!menu) return;
    const close = () => setMenu(false);
    window.addEventListener("click", close);
    return () => window.removeEventListener("click", close);
  }, [menu]);
  useDemoOverrides(ref, rec);
  return (
    <div className="text-left group w-[248px] relative">
      <button onClick={onPreview} className="block w-full text-left">
        <div className="rounded-[30px] overflow-hidden bg-white/[0.03] border border-white/10 group-hover:border-white/25 shadow-sm group-hover:shadow-xl group-hover:shadow-black/[.08] group-hover:-translate-y-0.5 transition-all duration-200 relative" style={{ width: CW, height: CH }}>
          {mp4
            ? <video src={mp4} autoPlay loop muted playsInline className="w-full h-full object-contain" />
            : pre
              ? <div ref={ref} className="pointer-events-none absolute" style={{ width: t.width, height: t.height, transform: `translate(${ox}px, ${oy}px) scale(${sc})`, transformOrigin: "top left" }}><t.Component preload={pre} /></div>
              : (d.thumb ? <img src={d.thumb} className="w-full h-full object-cover" /> : null)}
        </div>
      </button>
      {/* ⋯ actions menu (hover, over the preview) */}

const routeFromHash = () => {
  const parts = (typeof location !== "undefined" ? location.hash || "" : "").replace(/^#\/?/, "").split("/");
  if (parts[0] === "template" && parts[1]) return { sel: decodeURIComponent(parts[1]), page: "templates" };
  if (parts[0] === "demos") return { sel: null, page: "demos" };
  if (parts[0] === "projects") return { sel: null, page: "showcase" };
  if (parts[0] === "hooks") return { sel: null, page: "hooks" };
  if (parts[0] === "brand") return { sel: null, page: "brand" };
  return { sel: null, page: "templates" };
};

/* one downloadable brand asset: format menu (SVG/PNG/JPG) + hover eye -> preview modal */
function AssetCard({ file, label, bg, onPreview }) {
  const [menu, setMenu] = useState(false);
  useEffect(() => {
    if (!menu) return;
    const close = () => setMenu(false);
    window.addEventListener("click", close);
    return () => window.removeEventListener("click", close);
  }, [menu]);
  const isSvg = file.endsWith(".svg");
  const base = file.replace(/\.(svg|png|jpg)$/, "");
  const trigger = (href, name) => { const a = document.createElement("a"); a.href = href; a.download = name; a.click(); if (window.__toast) window.__toast("Downloading " + name); };
  const dl = async (fmt) => {
    setMenu(false);
    const url = "/brand/" + file;
    if (fmt === (isSvg ? "svg" : "png") && fmt !== "jpg") {
      if (fmt === "svg" || file.endsWith(".png")) { trigger(url, base + "." + fmt); return; }
    }
    const img = new Image();
    img.src = url;
    await new Promise((res, rej) => { img.onload = res; img.onerror = rej; });
    let ratio = img.naturalWidth ? img.naturalHeight / img.naturalWidth : 0;
    if (!isFinite(ratio) || !ratio) {
      const txt = await fetch(url).then(r => r.text());
      const m = txt.match(/viewBox="([\d.\s-]+)"/);
      const vb = m ? m[1].trim().split(/\s+/).map(Number) : null;
      ratio = vb && vb[2] ? vb[3] / vb[2] : 1;
    }
    const W = 1600, c = document.createElement("canvas");
    c.width = W; c.height = Math.max(2, Math.round(W * ratio));
    const ctx = c.getContext("2d");
    if (fmt === "jpg") { ctx.fillStyle = bg || "#ffffff"; ctx.fillRect(0, 0, c.width, c.height); }
    ctx.drawImage(img, 0, 0, c.width, c.height);
    trigger(c.toDataURL(fmt === "jpg" ? "image/jpeg" : "image/png", 0.95), base + "." + fmt);
  };
  const fmts = isSvg ? ["svg", "png", "jpg"] : ["png", "jpg"];
  return (
    <div className="snap-start shrink-0 w-[200px] rounded-[30px] bg-white/[0.03] border border-white/10 overflow-hidden">
      <button onClick={() => onPreview({ file, label, bg })} className="relative w-full h-[120px] flex items-center justify-center p-5 group/asset" style={{ background: bg }}>
        <img src={"/brand/" + file} alt={label} className="max-h-full max-w-full object-contain" />
        <span className="absolute inset-0 flex items-center justify-center bg-zinc-950/0 group-hover/asset:bg-zinc-950/40 opacity-0 group-hover/asset:opacity-100 transition">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </span>
      </button>
      <div className="p-3.5 flex items-center justify-between gap-2 relative">
        <span className="text-xs font-medium text-zinc-300 truncate">{label}</span>
        <button onClick={(e) => { e.stopPropagation(); setMenu(m => !m); }} title="Download"
          className="shrink-0 w-7 h-7 flex items-center justify-center rounded-full bg-white/10 text-zinc-300 hover:bg-white/20 hover:text-white transition">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/></svg>
        </button>
        {menu && <div className="absolute right-2 bottom-11 z-40 w-28 rounded-[18px] bg-[#242424] shadow-xl border border-white/10 py-1.5" onClick={e => e.stopPropagation()}>
          {fmts.map(f => <button key={f} onClick={() => dl(f)} className="w-full text-left px-3.5 py-1.5 text-sm text-zinc-200 hover:bg-white/10 transition uppercase">{f}</button>)}
        </div>}
      </div>
    </div>
  );
}

                      <input type="color" value={insp.logoBg} onChange={e => { insp.logoApi.setBg(e.target.value); setInsp({ ...insp, logoBg: e.target.value }); }} className="absolute inset-0 opacity-0 cursor-pointer" />
                    </label>
                    <span className="text-sm text-zinc-400 flex-1">{insp.logoBg}</span>
                  </div>
                  <p className="text-xs text-neutral-400 mt-1 leading-relaxed">Defaults to the logo's main color.</p>
                </div>
              </section>
              {insp.logoApi.remove && <button onClick={() => { insp.logoApi.remove(); deselect(); }} className="w-full px-3 py-2 rounded-[30px] text-sm font-medium text-red-600 bg-red-50 hover:bg-red-100 transition">Remove this logo</button>}
            </div>}

            {insp && !insp.isLogo && !insp.isMedia && <div className="space-y-5">
              <div className="flex items-center justify-between">
                <span className="text-[11px] uppercase tracking-wider text-neutral-400 font-semibold">{insp.isText ? "Text" : insp.isSlot ? "Media slot" : "Element"}</span>
              </div>

              {insp.isSlot && <button onClick={uploadIntoSlot} className="w-full px-3 py-2.5 rounded-[30px] bg-white hover:bg-zinc-200 text-zinc-900 text-sm font-medium shadow-sm transition">Upload media into slot</button>}

              {insp.swapKey != null && <section className="space-y-3">
                <div className="text-[11px] uppercase tracking-wider text-neutral-400 font-semibold">Label content</div>
                <div className="flex rounded-[30px] overflow-hidden border border-white/10 bg-white/5 w-max">
                  <button onClick={() => { const api = window.__slotAPI; if (api && api.setLabelText) { api.setLabelText({ ...(api.labelText || {}), [insp.swapKey]: null }); deselect(); } }} className={!insp.swapOn ? SEG_ON : SEG}>Logo</button>
                  <button onClick={() => { const api = window.__slotAPI; if (api && api.setLabelText) { const cur = (api.labelText || {})[insp.swapKey]; api.setLabelText({ ...(api.labelText || {}), [insp.swapKey]: cur != null ? cur : "AGENT OPUS" }); deselect(); } }} className={insp.swapOn ? SEG_ON : SEG}>Text</button>
                </div>
                <p className="text-xs text-neutral-400 leading-relaxed">Swap the logo for editable text — then click the text to change it.</p>
              </section>}

              {insp.pinPath != null && <section className="space-y-3">
                <div className="text-[11px] uppercase tracking-wider text-neutral-400 font-semibold">Label position</div>
                <div className="grid grid-cols-2 gap-2">
                  {[["tl", "↖ Top left"], ["tr", "↗ Top right"], ["bl", "↙ Bottom left"], ["br", "↘ Bottom right"]].map(([c, label]) => (
                    <button key={c} onClick={() => setPin(c)}
                      className={"px-2.5 py-2 rounded-[30px] text-sm font-medium transition " + (insp.pin === c ? "bg-[#2F2F2F] text-white" : "bg-white/10 text-zinc-300 hover:bg-white/15")}>
                      {label}
                    </button>
                  ))}
                </div>
                <p className="text-xs text-neutral-400 leading-relaxed">Moves the label pill to a corner of its card.</p>
              </section>}

              <section className="space-y-3">
                <div className="text-[11px] uppercase tracking-wider text-neutral-400 font-semibold">Appearance</div>
                <div>
                  <label className={LBL}>Background</label>
                  <div className="flex items-center gap-2">
                    <label className="relative w-9 h-9 rounded-[30px] border border-white/10 overflow-hidden cursor-pointer shrink-0" style={{ background: insp.bgTransparent ? "repeating-conic-gradient(#eee 0 25%, #fff 0 50%) 50%/12px 12px" : insp.bgHex }}>
                      <input type="color" value={insp.bgHex} onChange={e => setStyle("backgroundColor", e.target.value, { bgHex: e.target.value, bgTransparent: false })} className="absolute inset-0 opacity-0 cursor-pointer" />
                    </label>
                    <span className="text-sm text-zinc-400 flex-1">{insp.bgTransparent ? "None" : insp.bgHex}</span>
                    <button onClick={() => setStyle("backgroundColor", "transparent", { bgTransparent: true })} className={"px-2.5 py-1 text-xs rounded-[30px] transition " + (insp.bgTransparent ? "bg-[#2F2F2F] text-white" : "bg-white/10 text-zinc-300 hover:bg-white/15")}>Clear</button>
                  </div>
                </div>
                <div>
                  <label className={LBL}>Opacity · {insp.opacity}%</label>
                  <input type="range" min="0" max="100" value={insp.opacity} onChange={e => setStyle("opacity", (+e.target.value / 100).toString(), { opacity: +e.target.value })} className="w-full accent-white" />
                </div>
                <div>
                  <label className={LBL}>Corner radius</label>
                  <input type="number" min="0" value={insp.radius} onChange={e => setStyle("borderRadius", (+e.target.value) + "px", { radius: +e.target.value })} className={FIELD} />
                </div>
                <div>
                  <label className={LBL}>Pattern</label>
                  <div className="flex rounded-[30px] overflow-hidden border border-white/10 bg-white/5 w-max">
                    {[["none", "None"], ["grid", "Grid"], ["dots", "Dots"], ["lines", "Lines"]].map(([k, label]) => (
                      <button key={k} onClick={() => setPattern(k)} className={(insp.pattern || "none") === k ? SEG_ON : SEG}>{label}</button>
                    ))}
                  </div>
                  <p className="text-xs text-neutral-400 mt-1 leading-relaxed">Overlays a subtle pattern on top of the background color.</p>
                </div>
                {insp.tag === "img" && insp.imgH != null && <div>
                  <label className={LBL}>Size · {insp.imgH}px</label>
                  <input type="range" min="12" max="240" value={insp.imgH}
                    onChange={e => setStyle("height", e.target.value + "px", { imgH: +e.target.value })}
                    className="w-full accent-white" />
                </div>}
                {insp.moved && <button onClick={() => setStyle("transform", "", { moved: false })} className="w-full px-3 py-2 rounded-[30px] text-sm font-medium text-zinc-200 bg-white/10 hover:bg-white/15 transition">Reset position</button>}
                <p className="text-xs text-neutral-400 leading-relaxed">Drag the ✥ handle on the canvas to move this element — it snaps to an 8px grid (hold Alt for free movement).</p>
              </section>

              {insp.isText && <section className="space-y-3">
                <div className="text-[11px] uppercase tracking-wider text-neutral-400 font-semibold">Text</div>
                <div>
                  <label className={LBL}>Font</label>
                  <select value={insp.font} onChange={e => setStyle("fontFamily", e.target.value + ",sans-serif", { font: e.target.value })} className={FIELD}>
                    {FONTS.map(f => <option key={f} value={f}>{f}</option>)}
                  </select>
                </div>
                <div className="flex gap-2">
                  <div className="flex-1">
                    <label className={LBL}>Weight</label>
                    <select value={insp.weight} onChange={e => setStyle("fontWeight", e.target.value, { weight: +e.target.value })} className={FIELD}>
                      {WEIGHTS.map(([n, w]) => <option key={w} value={w}>{n}</option>)}
                    </select>
                  </div>
                  <div className="w-[86px]">
                    <label className={LBL}>Size</label>
                    <input type="number" value={insp.size} onChange={e => setStyle("fontSize", e.target.value + "px", { size: +e.target.value })} className={FIELD} />
                  </div>
                </div>
                <div>
                  <label className={LBL}>Color</label>
                  <div className="flex items-center gap-2">
                    <label className="relative w-9 h-9 rounded-[30px] border border-white/10 overflow-hidden cursor-pointer shrink-0" style={{ background: insp.color }}>
                      <input type="color" value={insp.color} onChange={e => setStyle("color", e.target.value, { color: e.target.value })} className="absolute inset-0 opacity-0 cursor-pointer" />
                    </label>
                    <span className="text-sm text-zinc-400">{insp.color}</span>
                  </div>
                </div>
                <div>
                  <label className={LBL}>Alignment & style</label>
                  <div className="flex gap-2">
                    <div className="flex rounded-[30px] overflow-hidden border border-white/10 bg-white/5">
                      {["left", "center", "right"].map(a => <button key={a} onClick={() => setStyle("textAlign", a, { align: a })} className={insp.align === a ? SEG_ON : SEG}>{a[0].toUpperCase()}</button>)}
                    </div>
                    <button onClick={() => setStyle("fontStyle", insp.italic ? "normal" : "italic", { italic: !insp.italic })} className={"px-3 py-1.5 rounded-[30px] italic text-sm border border-white/10 " + (insp.italic ? "bg-zinc-900 text-white border-transparent" : "bg-white/10 text-zinc-300 hover:bg-white/15")}>I</button>
                    <button onClick={() => setStyle("textDecoration", insp.underline ? "none" : "underline", { underline: !insp.underline })} className={"px-3 py-1.5 rounded-[30px] underline text-sm border border-white/10 " + (insp.underline ? "bg-zinc-900 text-white border-transparent" : "bg-white/10 text-zinc-300 hover:bg-white/15")}>U</button>
                  </div>
                </div>
                <p className="text-xs text-neutral-400 leading-relaxed">Type on the highlighted text to change the words.</p>
              </section>}
            </div>}
          </div>

          {IS_LOCAL && <div className="px-5 py-4 border-t border-white/10">
            <button onClick={saveDemo}
              className="w-full text-sm px-3 py-2.5 rounded-[30px] bg-white/10 hover:bg-white/15 text-zinc-100 font-medium transition">
              {saved === "saving" ? "Saving…" : saved ? "Saved to Demos ✓" : "Save to Demos"}</button>
          </div>}
        </aside>

        <div className="flex-1 h-screen flex flex-col">
        <header className="h-14 shrink-0 bg-[#1A1A1A]/85 backdrop-blur border-b border-white/10 flex items-center justify-end gap-3 px-4">
          {exportProg && <div className="flex items-center gap-2 w-72">
            <div className="flex-1 h-1.5 rounded-full bg-white/15 overflow-hidden">
              <div className="h-full bg-white transition-all duration-300" style={{ width: exportProg.pct + "%" }} />
            </div>
            <span className="text-xs text-zinc-400 whitespace-nowrap">{exportProg.label}</span>
          </div>}
          <button onClick={exportMp4} disabled={exporting}
            className="text-sm px-4 py-2 rounded-[30px] bg-white hover:bg-zinc-200 text-zinc-900 font-medium transition disabled:opacity-60 disabled:cursor-wait">
            {exporting ? "Exporting…" : "Export"}</button>
        </header>
        <main ref={mainRef} className="flex-1 flex items-center justify-center p-8 overflow-auto relative">
          <div style={{ width: t.width * s, height: t.height * s }} className="relative overflow-hidden shadow-[0_20px_60px_-15px_rgba(0,0,0,.25)] shrink-0">
            <div ref={containerRef} onClickCapture={onEditorClick} onInput={onTextInput} onPointerDown={onMediaDragStart}
              style={{ width: t.width, height: t.height, transform: `scale(${s})`, transformOrigin: "top left" }}>
              <t.Component />
            </div>
            {guides && <div className="absolute inset-0 pointer-events-none z-30">
              <div className="absolute top-0 bottom-0 w-px bg-[#2563eb]/80" style={{ left: guides.x * s }} />
              <div className="absolute left-0 right-0 h-px bg-[#2563eb]/80" style={{ top: guides.y * s }} />
            </div>}
          </div>
          {handle && insp && !insp.isMedia && !insp.isLogo && insp.path !== "" && insp.path !== "0" && (
            <button onPointerDown={startMoveDrag} title="Drag to move"
              style={{ left: handle.x - 2, top: handle.y - 34 }}
              className="absolute z-40 w-7 h-7 flex items-center justify-center rounded-[30px] bg-white text-zinc-900 shadow-lg cursor-move select-none">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2v20M2 12h20"/><path d="M9 5l3-3 3 3"/><path d="M9 19l3 3 3-3"/><path d="M5 9l-3 3 3 3"/><path d="M19 9l3 3-3 3"/></svg>
            </button>
          )}
          <button onClick={() => setSoundOn(v => !v)} title={soundOn ? "Mute preview" : "Play sound"}
            className={"absolute bottom-6 right-6 w-11 h-11 flex items-center justify-center rounded-full shadow-lg transition " + (soundOn ? "bg-white text-zinc-900" : "bg-[#242424] text-zinc-300 hover:bg-white/10 ring-1 ring-white/10")}>
            {soundOn
              ? <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M15.5 8.5a5 5 0 010 7"/><path d="M19 5a9 9 0 010 14"/></svg>
              : <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M22 9l-6 6"/><path d="M16 9l6 6"/></svg>}
          </button>
        </main>
        </div>

        {toastEl}
        {picker && <LogoPicker onPick={(uri) => { picker.cb(uri); setPicker(null); }} onClose={() => setPicker(null)} />}
      </div>
    );
  }

  /* ---------- gallery / showcase (side nav) ---------- */
  const iconTemplates = <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M7 4v16"/><path d="M17 4v16"/><path d="M2 9h5"/><path d="M2 15h5"/><path d="M17 9h5"/><path d="M17 15h5"/></svg>;
  const iconShowcase = <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 3l8 4.5v9L12 21l-8-4.5v-9L12 3z"/><path d="M12 12l8-4.5"/><path d="M12 12v9"/><path d="M12 12L4 7.5"/></svg>;
  const iconHooks = <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 3v3M18.4 5.6l-2.1 2.1M21 12h-3M5.6 5.6l2.1 2.1M3 12h3M12 21a6 6 0 006-6c0-2-1-3.5-2.5-5L12 6.5 8.5 10C7 11.5 6 13 6 15a6 6 0 006 6z"/></svg>;
  const iconBrand = <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>;
  const sideBtn = (id, label, icon) => (
    <button onClick={() => setPage(id)} title={label} aria-label={label}
      className={"w-full flex items-center gap-3 px-4 py-2.5 rounded-[30px] text-[15px] font-medium transition " + (page === id ? "bg-[#2F2F2F] text-white" : "text-zinc-400 hover:bg-white/10 hover:text-white")}>
      {icon}{label}
    </button>
  );
  const shownTemplates = templates.filter(t =>
    (tplFilter === "all" || aspectOf(t) === tplFilter) &&
    (!tplQuery || (t.name + " " + (t.desc || "")).toLowerCase().includes(tplQuery.toLowerCase())));
  const chipBtn = (id, label, cur, set) => (
    <button key={id} onClick={() => set(id)}
      className={"px-3 py-1.5 rounded-[30px] text-sm font-medium transition " + (cur === id ? "bg-[#2F2F2F] text-white ring-1 ring-white/10" : "bg-transparent text-zinc-400 ring-1 ring-white/15 hover:ring-white/30")}>
      {label}
    </button>
  );
  const chip = (id, label) => chipBtn(id, label, tplFilter, setTplFilter);
  const shownDemos = demos.filter(d => {
    const t = templates.find(x => x.id === d.templateId);
    return t && (demoFilter === "all" || aspectOf(t) === demoFilter);
  });
  const demosView = demos.length ? (
    <div>
      <div className="flex items-center justify-end gap-2 mb-8">
        {chipBtn("all", "All", demoFilter, setDemoFilter)}{chipBtn("16:9", "16:9", demoFilter, setDemoFilter)}{chipBtn("9:16", "9:16", demoFilter, setDemoFilter)}{chipBtn("1:1", "1:1", demoFilter, setDemoFilter)}
      </div>
      <div className="flex flex-wrap gap-6">
      {shownDemos.map(d => {
        const t = templates.find(x => x.id === d.templateId);
        const rec = demoRecs[d.id];
        return <DemoCard key={d.id} t={t} d={d} rec={rec} pre={demoPreload(rec)} uniform={demoFilter === "all"} onOpen={() => openDemo(d.id)} onPreview={() => setPreview(d.id)} onDelete={(e) => deleteDemo(d.id, e)} />;
      })}
      </div>
    </div>
  ) : (
    <div className="text-center py-28 text-neutral-400">
      <div className="w-14 h-14 mx-auto rounded-[30px] bg-white/10 flex items-center justify-center text-neutral-300">{iconShowcase}</div>
      <div className="mt-4 text-lg font-medium text-zinc-300">No demos yet</div>
      <p className="mt-1 text-sm">Open a template, add your videos, then hit <span className="font-medium text-zinc-300">Save to Demos</span>.</p>
    </div>
  );
  // standalone, nav-less demos page at #/demos
  const previewDemo = preview && demos.find(x => x.id === preview);
  const previewModal = previewDemo
    ? <DemoPreview d={previewDemo} t={templates.find(x => x.id === previewDemo.templateId)} rec={demoRecs[preview]} pre={demoPreload(demoRecs[preview])} onClose={() => setPreview(null)} onOpen={() => { setPreview(null); openDemo(preview); }} />
    : null;
  if (page === "demos") {
    return (
      <div className="min-h-screen text-zinc-100">
        <div className="max-w-6xl mx-auto px-8 py-10">{demosView}</div>
        {previewModal}
        {toastEl}
        {picker && <LogoPicker onPick={(uri) => { picker.cb(uri); setPicker(null); }} onClose={() => setPicker(null)} />}
      </div>
    );
  }
  return (
    <div className="min-h-screen flex text-zinc-100">
      {/* side nav */}
      <aside className="w-[224px] shrink-0 sticky top-0 h-screen bg-[#1A1A1A] border-r border-white/10 flex flex-col z-30">
        <div className="px-5 pt-5 pb-4 flex flex-row items-center gap-2 text-[20px] font-bold text-white">
          <svg aria-label="opus agent logo" fill="currentColor" viewBox="0 0 24 24" width="28" height="28"><path d="M3.81659 11.9633C3.83636 7.46057 7.49262 3.81651 12 3.81651C16.5196 3.81651 20.1835 7.48039 20.1835 12C20.1835 16.5196 16.5196 20.1835 12 20.1835C11.4083 20.1835 10.8313 20.1207 10.2752 20.0014V23.877C10.8385 23.958 11.4143 24 12 24C18.6274 24 24 18.6274 24 12C24 5.37258 18.6274 0 12 0C5.37258 0 0 5.37258 0 12V23.9633H3.81651C3.81651 23.9633 3.81659 17.1939 3.81659 12.6C3.81659 12.5076 3.81659 11.9633 3.81659 11.9633Z"></path><path d="M5.13761 11.9948V24H8.95413L8.95429 12.76V11.9633C8.97119 10.3004 10.3264 8.95413 12 8.95413C13.6841 8.95413 15.0459 10.3174 15.0459 11.9948C15.0459 13.6721 13.6841 15.0354 12 15.0354C11.3594 15.0354 10.7654 14.8381 10.2752 14.5013V18.6335C10.8264 18.776 11.4044 18.8519 12 18.8519C15.7881 18.8519 18.8624 15.7838 18.8624 11.9948C18.8624 8.20576 15.7881 5.13761 12 5.13761C8.21192 5.13761 5.13761 8.20576 5.13761 11.9948Z"></path></svg>
          <span className="whitespace-nowrap">Agent Opus</span>
        </div>
        <nav className="p-3 pt-1 flex flex-col gap-1">
          {sideBtn("templates", "Templates", iconTemplates)}
          {sideBtn("showcase", "Demos", iconShowcase)}
          {sideBtn("hooks", "Hooks", iconHooks)}
          {sideBtn("brand", "Brand Guidelines", iconBrand)}
        </nav>
      </aside>

      {/* content */}
      <main className="flex-1 min-w-0">
        <div className="max-w-6xl mx-auto px-8 py-10">
          {page === "hooks" ? (
            <HooksPage />
          ) : page === "brand" ? (
            <BrandPage />
          ) : page === "templates" ? (
            <div>
              <header className="flex flex-wrap items-center justify-end gap-4 mb-8">
                <div className="flex items-center gap-2">
                  {chip("all", "All")}{chip("16:9", "16:9")}{chip("9:16", "9:16")}{chip("1:1", "1:1")}
                </div>
              </header>
              <div className="flex flex-wrap gap-6">
                {shownTemplates.map(t => {
                  const CW = 248;
                  const uniform = tplFilter === "all";
                  const CH = uniform ? Math.round(CW * 16 / 9) : Math.round(t.height * (CW / t.width));
                  const sc = uniform ? Math.min(CW / t.width, CH / t.height) : CW / t.width;
                  const ox = (CW - t.width * sc) / 2, oy = (CH - t.height * sc) / 2;
                  return (
                    <button key={t.id} onClick={() => setSel(t.id)} className="text-left group w-[248px]">
                      <div className="relative overflow-hidden rounded-[30px] bg-white/[0.03] border border-white/10 group-hover:border-white/25 shadow-sm group-hover:shadow-xl group-hover:shadow-black/[.08] group-hover:-translate-y-0.5 transition-all duration-200" style={{ width: CW, height: CH }}>
                        <div className="pointer-events-none absolute" style={{ width: t.width, height: t.height, transform: `translate(${ox}px, ${oy}px) scale(${sc})`, transformOrigin: "top left" }}><t.Component /></div>
                        <div className="absolute inset-0 flex items-center justify-center bg-zinc-950/0 group-hover:bg-zinc-950/30 opacity-0 group-hover:opacity-100 transition duration-200">
                          <span className="px-3.5 py-1.5 rounded-[30px] bg-white text-zinc-900 text-sm font-medium shadow-lg">Use template</span>
                        </div>
                      </div>
                    </button>
                  );
                })}
              </div>
              {!shownTemplates.length && <div className="text-center py-24 text-sm text-zinc-400">No templates match — clear the search or filter.</div>}
            </div>
          ) : (
            <div>{demosView}</div>
          )}
        </div>
      </main>
      {previewModal}
      {toastEl}
      {picker && <LogoPicker onPick={(uri) => { picker.cb(uri); setPicker(null); }} onClose={() => setPicker(null)} />}
    </div>
  );
}

function LogoPicker({ onPick, onClose }) {
  const upload = () => { const i = document.createElement("input"); i.type = "file"; i.accept = "image/*,.svg"; i.onchange = e => { const f = e.target.files[0]; if (f) onPick(URL.createObjectURL(f)); }; i.click(); };
  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center bg-neutral-900/30 backdrop-blur-sm" onClick={onClose}>
      <div className="bg-[#212121] rounded-[30px] p-6 w-[440px] max-w-[92vw] shadow-2xl" onClick={e => e.stopPropagation()}>
        <div className="flex items-center justify-between mb-5">
          <div className="text-zinc-100 font-semibold text-lg">Choose a logo</div>
          <button onClick={onClose} className="w-8 h-8 flex items-center justify-center rounded-[30px] text-zinc-400 hover:bg-white/10 transition">✕</button>
        </div>
        <div className="grid grid-cols-4 gap-3">
          {LOGO_LIBRARY.map(l => (
            <button key={l.name} onClick={() => onPick(l.uri)} title={l.name} className="aspect-square rounded-[30px] bg-white ring-1 ring-white/10 hover:ring-white flex items-center justify-center p-3.5 transition">
              <img src={l.uri} alt={l.name} className="w-full h-full object-contain" />
            </button>
          ))}
        </div>
        <button onClick={upload} className="mt-4 w-full py-3 rounded-[30px] bg-neutral-900 hover:bg-neutral-800 text-white font-medium transition">Upload your own image…</button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
