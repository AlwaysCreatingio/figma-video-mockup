# Render blueprint: deploys the MP4 export server as a Docker web service.
# In Render: New + -> Blueprint -> pick this repo -> Apply.
services:
  - type: web
    name: agentopus-export
    runtime: docker
    plan: free
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      # 2x supersample (crisp text). If exports start 502ing on the free 512 MB instance,
      # drop this to "1" — Chromium at 2x is what gets OOM-killed.
      - key: EXPORT_SCALE
        value: "2"
