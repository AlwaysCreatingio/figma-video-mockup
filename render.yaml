# Render blueprint: deploys the MP4 export server as a Docker web service.
# In Render: New + -> Blueprint -> pick this repo -> Apply.
services:
  - type: web
    name: agentopus-export
    runtime: docker
    plan: pro
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      # Pro (4 GB / 2 CPU) comfortably fits Chromium at the 2x supersample — crisp text.
      # If this service is ever downgraded below 2 GB, drop this back to "1" or exports OOM.
      - key: EXPORT_SCALE
        value: "2"
