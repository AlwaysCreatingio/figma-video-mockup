# Render blueprint: deploys the MP4 export server as a Docker web service.
# In Render: New + -> Blueprint -> pick this repo -> Apply.
services:
  - type: web
    name: agentopus-export
    runtime: docker
    plan: free
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      # Free tier (512 MB) can't fit Chromium at the default 2x supersample — it gets OOM-killed
      # mid-export (verified: 2x 502s even with production React). 1x is reliable but softer.
      # For crisp 2x exports either upgrade this service to Standard (2 GB) and set "2",
      # or export from a machine running `npm run export-server` locally (defaults to 2x).
      - key: EXPORT_SCALE
        value: "1"
