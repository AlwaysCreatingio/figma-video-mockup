<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Original vs Agent Opus — from Figma</title>
<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.26.4/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;height:100%;background:#0b0b0d;}
  *{font-family:'Geist',-apple-system,BlinkMacSystemFont,sans-serif;}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useRef, useEffect } = React;

// ---- The Figma frame, converted to React+Tailwind. Slots are live video uploaders. ----
function NineSixteenTemplate() {
  const [videos, setVideos] = useState({ left: null, right: null });
  const [icons, setIcons] = useState({ left: null, right: null });
  const [titles, setTitles] = useState({ left: "Original", right: "Agent Opus" });

  const upload = (accept, cb) => {
    const input = document.createElement("input");
    input.type = "file"; input.accept = accept;
    input.onchange = e => { const f = e.target.files[0]; if (f) cb(URL.createObjectURL(f)); };
    input.click();
  };

  // slot = the white 9:16 rounded rectangle from Figma, now a video drop zone
  const Slot = ({ side }) => (
    <div
      onClick={() => upload("video/*", url => setVideos(v => ({ ...v, [side]: url })))}
      className="aspect-[1080/1920] bg-white rounded-[20px] w-full overflow-hidden relative cursor-pointer group"
    >
      {videos[side] ? (
        <video src={videos[side]} autoPlay loop muted playsInline
               className="w-full h-full object-cover" />
      ) : (
        <div className="absolute inset-0 flex flex-col items-center justify-center gap-2 text-neutral-400 group-hover:text-neutral-600 transition">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5">
            <rect x="3" y="5" width="18" height="14" rx="2"/><path d="M10 9l5 3-5 3z"/>
          </svg>
          <span className="text-sm font-semibold">Add video</span>
          <span className="text-xs opacity-70">click to upload</span>
        </div>
      )}
    </div>
  );

  const IconBox = ({ side }) => (
    <div
      onClick={() => upload("image/*", url => setIcons(i => ({ ...i, [side]: url })))}
      className="bg-white rounded-[15.75px] size-[90px] overflow-hidden cursor-pointer flex items-center justify-center"
    >
      {icons[side]
        ? <img src={icons[side]} className="w-full h-full object-cover" />
        : <span className="text-[10px] font-semibold text-neutral-400">logo</span>}
    </div>
  );

  const Panel = ({ side }) => (
    <div className="flex flex-col gap-[20px] items-center w-[241.471px]">
      <input
        value={titles[side]}
        onChange={e => setTitles(t => ({ ...t, [side]: e.target.value }))}
        className="bg-transparent text-center uppercase text-white font-semibold text-[32px] tracking-[-0.16px] w-full outline-none focus:opacity-80"
        style={{ lineHeight: "1" }}
      />
      <Slot side={side} />
    </div>
  );

  return (
    <div className="bg-[#181818] relative w-[594px] h-[1056px] overflow-hidden">
      {/* soft glow standing in for the blurred backdrop layer */}
      <div className="absolute inset-0 opacity-40"
           style={{ background: "radial-gradient(120% 80% at 50% -10%, rgba(255,87,10,.18), transparent 60%)" }} />

      <div className="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 flex flex-col gap-[42px] items-center w-[522.941px]">
        {/* top icon row */}
        <div className="flex gap-[20px] items-center">
          <IconBox side="left" />
          <div className="relative size-[34px]">
            <span className="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 text-white text-[34px] leading-none font-light">+</span>
          </div>
          <IconBox side="right" />
        </div>

        {/* two comparison panels */}
        <div className="flex gap-[40px]">
          <Panel side="left" />
          <Panel side="right" />
        </div>

        {/* caption */}
        <p className="text-center font-semibold text-[40px] tracking-[-0.2px]">
          <span className="text-white">Comment </span>
          <span className="text-[#ff570a]">“AgentOpus”</span>
        </p>
      </div>
    </div>
  );
}

// ---- fit the 594x1056 frame to the viewport ----
function Stage() {
  const [scale, setScale] = useState(1);
  useEffect(() => {
    const fit = () => setScale(Math.min(1, (window.innerHeight - 48) / 1056, (window.innerWidth - 48) / 594));
    fit(); window.addEventListener("resize", fit);
    return () => window.removeEventListener("resize", fit);
  }, []);
  return (
    <div className="min-h-screen w-full flex items-center justify-center p-6">
      <div style={{ transform: `scale(${scale})` }} className="shadow-[0_30px_80px_rgba(0,0,0,.6)]">
        <NineSixteenTemplate />
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Stage />);
</script>
</body>
</html>
